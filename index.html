imary));\n  return row;\n}\n\nasync function handleFishIndex(interaction) {\n  const embed = await buildFishIndexEmbed(1, interaction.user.id);\n  const row   = buildFishIndexRow(1);\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\nasync function handleFishIndexPage(interaction) {\n  const page  = parseInt(interaction.customId.replace('fishidx_', ''), 10);\n  const embed = await buildFishIndexEmbed(page, interaction.user.id);\n  const row   = buildFishIndexRow(page);\n  await interaction.update({ embeds: [embed], components: [row] });\n}\n\nmodule.exports = { handleFishIndex, handleFishIndexPage };\n", "handlers/market.js": "// market.js — ระบบ /ขายของ ผู้เล่น-ต่อ-ผู้เล่น\n// ห้องซื้อขาย: 1489957618851254384\n// ห้องประกาศ:  1489960051899633724\nconst {\n  EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle,\n  ModalBuilder, TextInputBuilder, TextInputStyle,\n} = require('discord.js');\nconst db = require('../database');\nconst { FISH_LIST, RARITY } = require('../data/fish');\nconst { RODS, BAITS, CHARMS, FOODS } = require('../data/items');\n\nconst SELL_CHANNEL = '1489957618851254384';\nconst LOG_CHANNEL  = '1489960051899633724';\n\n// ── /ขายของ slash command ────────────────────────────────────\nasync function handleSellCommand(interaction) {\n  if (interaction.channelId !== SELL_CHANNEL)\n    return interaction.reply({ content: `❌ ใช้คำสั่งนี้ได้เฉพาะใน <#${SELL_CHANNEL}> เท่านั้น!`, ephemeral: true });\n\n  const player = await db.getPlayer(interaction.user.id);\n  if (!player) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน!', ephemeral: true });\n  if (player.is_banned) return interaction.reply({ content: '🚫 บัญชีของคุณถูกแบน', ephemeral: true });\n\n  const embed = new EmbedBuilder()\n    .setTitle('🏪 จะขายอะไรดี?')\n    .setDescription('เลือกประเภทสิ่งของที่ต้องการลงขาย:')\n    .setColor(0xE67E22);\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('mkt_select_fish').setLabel('🐟 ปลา').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('mkt_select_rod').setLabel('🎣 คันเบ็ด').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('mkt_select_food').setLabel('🍱 อาหาร').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('mkt_select_charm').setLabel('🍀 เครื่องราง').setStyle(ButtonStyle.Secondary),\n  );\n\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\n// ── เลือกสิ่งของ + ราคา (Modal) ─────────────────────────────\nasync function handleMarketSelect(interaction) {\n  const type = interaction.customId.replace('mkt_select_', '');\n  const userId = interaction.user.id;\n  const inventory = await db.getInventory(userId);\n\n  // หาของที่มีในกระเป๋า\n  const typeMap = { fish: 'fish', rod: 'rod', food: 'food', charm: 'charm' };\n  const items = inventory.filter(i => i.item_type === typeMap[type] && i.quantity > 0);\n\n  if (!items.length)\n    return interaction.reply({ content: `❌ ไม่มี${type === 'fish' ? 'ปลา' : type === 'rod' ? 'คันเบ็ด' : type === 'food' ? 'อาหาร' : 'เครื่องราง'}ในกระเป๋า!`, ephemeral: true });\n\n  // สร้าง select embed\n  const lines = items.map((it, i) => {\n    const data = getItemData(it.item_id, type);\n    const wStr = it.weight ? ` ⚖️${it.weight}kg` : '';\n    const rStr = type === 'fish' ? ` ${RARITY[data?.rarity]?.emoji?.() || ''} ${RARITY[data?.rarity]?.name || ''}` : '';\n    return `\\`${i + 1}.\\` ${data?.emoji || '🔹'} **${data?.name || it.item_id}**${rStr}${wStr}`;\n  }).join('\\n');\n\n  const embed = new EmbedBuilder()\n    .setTitle('📦 เลือกสิ่งที่ต้องการขาย')\n    .setDescription(`${lines}\\n\\nพิมเลขที่ต้องการขายใน Modal ด้านล่าง`)\n    .setColor(0xE67E22);\n\n  // เก็บ items ไว้ชั่วคราวใน customId (max 25 items แสดง)\n  const safeItems = items.slice(0, 25);\n  const row = new ActionRowBuilder().addComponents(\n    ...safeItems.slice(0, 5).map((it, i) => {\n      const data = getItemData(it.item_id, type);\n      return new ButtonBuilder()\n        .setCustomId(`mkt_item_${type}_${it.id}_${it.item_id}`)\n        .setLabel(`${data?.emoji || '🔹'} ${(data?.name || it.item_id).slice(0, 20)}`)\n        .setStyle(ButtonStyle.Primary);\n    })\n  );\n\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\n// ── เลือก item แล้วเปิด Modal ตั้งราคา ──────────────────────\nasync function handleMarketItemSelect(interaction) {\n  // mkt_item_<type>_<invId>_<itemId>\n  const parts  = interaction.customId.split('_');\n  // parts: ['mkt','item','<type>','<invId>','<itemId...>']\n  const type   = parts[2];\n  const invId  = parts[3];\n  const itemId = parts.slice(4).join('_');\n\n  const modal = new ModalBuilder()\n    .setCustomId(`mkt_modal_${type}_${invId}_${itemId}`)\n    .setTitle('💰 ตั้งราคาขาย');\n\n  const priceInput = new TextInputBuilder()\n    .setCustomId('price')\n    .setLabel('ราคา (Pearl)')\n    .setStyle(TextInputStyle.Short)\n    .setPlaceholder('เช่น 500')\n    .setRequired(true);\n\n  modal.addComponents(new ActionRowBuilder().addComponents(priceInput));\n  await interaction.showModal(modal);\n}\n\n// ── Modal Submit → โพสลงห้อง ─────────────────────────────────\nasync function handleMarketModalSubmit(interaction) {\n  // mkt_modal_<type>_<invId>_<itemId>\n  const parts  = interaction.customId.split('_');\n  const type   = parts[2];\n  const invId  = parseInt(parts[3], 10);\n  const itemId = parts.slice(4).join('_');\n  const price  = parseInt(interaction.fields.getTextInputValue('price'), 10);\n\n  if (isNaN(price) || price <= 0)\n    return interaction.reply({ content: '❌ ราคาไม่ถูกต้อง', ephemeral: true });\n\n  const userId = interaction.user.id;\n  const player = await db.getPlayer(userId);\n  const inventory = await db.getInventory(userId);\n  const invItem = inventory.find(i => i.id === invId);\n\n  if (!invItem || invItem.quantity <= 0)\n    return interaction.reply({ content: '❌ ไม่พบสิ่งของนี้ในกระเป๋า', ephemeral: true });\n\n  const data    = getItemData(itemId, type);\n  const rarity  = type === 'fish' ? RARITY[data?.rarity] : null;\n  const rStr    = rarity ? ` ${rarity.emoji()} ${rarity.name} | ⚖️ น้ำหนัก: **${invItem.weight || '?'} kg**` : '';\n  const wStr    = (type !== 'fish' && invItem.weight) ? ` | ⚖️ น้ำหนัก: **${invItem.weight} kg**` : '';\n  const now    = new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });\n\n  const listEmbed = new EmbedBuilder()\n    .setTitle(`🏪 ลงขาย: ${data?.emoji || '🔹'} ${data?.name || itemId}`)\n    .setDescription(\n      `**ผู้ขาย:** <@${userId}>\\n` +\n      `**ประเภท:** ${typeLabel(type)}${rStr}${wStr}\\n` +\n      `**รายละเอียด:** ${data?.desc || '-'}\\n` +\n      `**ราคา:** 🔘 **${price.toLocaleString()} Pearl**\\n` +\n      `**เวลา:** ${now}`\n    )\n    .setColor(0xF39C12)\n    .setFooter({ text: `invId:${invId} | seller:${userId} | type:${type}` });\n\n  const buyRow = new ActionRowBuilder().addComponents(\n    new ButtonBuilder()\n      .setCustomId(`mkt_buy_${userId}_${invId}_${type}_${itemId}_${price}`)\n      .setLabel(`🛒 ซื้อ ${price.toLocaleString()} Pearl`)\n      .setStyle(ButtonStyle.Success),\n  );\n\n  const channel = interaction.client.channels.cache.get(SELL_CHANNEL);\n  if (!channel) return interaction.reply({ content: '❌ ไม่พบห้องซื้อขาย', ephemeral: true });\n\n  const msg = await channel.send({ embeds: [listEmbed], components: [buyRow] });\n  await interaction.reply({ content: `✅ ลงขายเรียบร้อย! ข้อความ ID: ${msg.id}`, ephemeral: true });\n}\n\n// ── ซื้อจากตลาด ──────────────────────────────────────────────\nasync function handleMarketBuy(interaction) {\n  // mkt_buy_<sellerId>_<invId>_<type>_<itemId>_<price>\n  const parts    = interaction.customId.split('_');\n  const sellerId = parts[2];\n  const invId    = parseInt(parts[3], 10);\n  const type     = parts[4];\n  const itemId   = parts.slice(5, -1).join('_');\n  const price    = parseInt(parts[parts.length - 1], 10);\n  const buyerId  = interaction.user.id;\n\n  if (buyerId === sellerId)\n    return interaction.reply({ content: '❌ ซื้อของตัวเองไม่ได้นะ!', ephemeral: true });\n\n  const buyer  = await db.getPlayer(buyerId);\n  const seller = await db.getPlayer(sellerId);\n\n  if (!buyer) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน!', ephemeral: true });\n  if (buyer.is_banned) return interaction.reply({ content: '🚫 บัญชีของคุณถูกแบน', ephemeral: true });\n  if ((buyer.pearl || 0) < price)\n    return interaction.reply({ content: `❌ Pearl ไม่พอ! ต้องการ **${price.toLocaleString()}** มี **${(buyer.pearl||0).toLocaleString()}**`, ephemeral: true });\n\n  // ตรวจ inventory ผู้ขาย\n  const sellerInv = await db.getInventory(sellerId);\n  const invItem   = sellerInv.find(i => i.id === invId);\n  if (!invItem || invItem.quantity <= 0)\n    return interaction.reply({ content: '❌ สินค้านี้ถูกขายไปแล้ว หรือผู้ขายไม่มีสิ่งของนี้แล้ว', ephemeral: true });\n\n  // โอนของ\n  if (type === 'fish' && invItem.weight) {\n    await db.addFishToInventory(buyerId, itemId, invItem.weight);\n    await db.removeFishById(sellerId, invId);\n  } else {\n    await db.addToInventory(buyerId, type, itemId, 1);\n    await db.removeFromInventory(sellerId, type, itemId, 1);\n  }\n\n  // โอน Pearl: buyer → seller\n  await db.updatePlayer(buyerId,  { pearl: (buyer.pearl  || 0) - price });\n  await db.updatePlayer(sellerId, { pearl: (seller?.pearl|| 0) + price });\n\n  const data = getItemData(itemId, type);\n  const now  = new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });\n\n  // ลบข้อความตลาด\n  try { await interaction.message.delete(); } catch (e) {}\n\n  // log ห้อง\n  const logChannel = interaction.client.channels.cache.get(LOG_CHANNEL);\n  if (logChannel) {\n    await logChannel.send({\n      embeds: [new EmbedBuilder()\n        .setTitle('💰 ซื้อขายสำเร็จ')\n        .setDescription(\n          `<@${buyerId}> ซื้อ **${data?.emoji||'🔹'} ${data?.name||itemId}** จาก <@${sellerId}>\\n` +\n          `🔘 ราคา **${price.toLocaleString()} Pearl** | เวลา ${now}`\n        )\n        .setColor(0x2ECC71)],\n    });\n  }\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ ซื้อสำเร็จ!')\n      .setDescription(`ได้รับ ${data?.emoji||'🔹'} **${data?.name||itemId}**\\n🔘 Pearl คงเหลือ: **${((buyer.pearl||0) - price).toLocaleString()}**`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ── Helpers ──────────────────────────────────────────────────\nfunction getItemData(itemId, type) {\n  if (type === 'fish')  return FISH_LIST.find(f => f.id === itemId);\n  if (type === 'rod')   return RODS[itemId];\n  if (type === 'bait')  return BAITS[itemId];\n  if (type === 'charm') return CHARMS[itemId];\n  if (type === 'food')  return FOODS[itemId];\n  return null;\n}\n\nfunction typeLabel(type) {\n  return { fish: '🐟 ปลา', rod: '🎣 คันเบ็ด', bait: '🪱 เหยื่อ', charm: '🍀 เครื่องราง', food: '🍱 อาหาร' }[type] || type;\n}\n\nmodule.exports = { handleSellCommand, handleMarketSelect, handleMarketItemSelect, handleMarketModalSubmit, handleMarketBuy };\n", "handlers/register.js": "const { EmbedBuilder } = require('discord.js');\nconst db = require('../database');\nconst { RODS, getExpertiseTitle } = require('../data/items');\nconst E = require('../data/emojis');\n\nasync function handleRegister(interaction) {\n  const userId   = interaction.user.id;\n  const username = interaction.user.username;\n\n  const existing = await db.getPlayer(userId);\n  if (existing) {\n    return interaction.reply({\n      embeds: [new EmbedBuilder()\n        .setTitle('⚓ ลงทะเบียนแล้ว!')\n        .setDescription(`คุณเข้าร่วมการผจญภัยไปแล้วนะ **${username}**!\\nไปเล่นได้ที่ <#1489522699943284766> เลย 🎣`)\n        .setColor(0xF39C12)],\n      ephemeral: true,\n    });\n  }\n\n  await db.createPlayer(userId, username);\n\n  try {\n    const member = await interaction.guild.members.fetch(userId);\n    await member.roles.add('1489583564159713280').catch(() => {});\n  } catch (e) {}\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('🎉 ยินดีต้อนรับสู่โลกแห่งการตกปลา!')\n      .setDescription(\n        `ยินดีต้อนรับ **${username}**!\\n\\n` +\n        '📦 **ของเริ่มต้นที่ได้รับ:**\\n' +\n        `> ${E.bamboo_rod} คันเบ็ดไม้ไผ่ × 1\\n` +\n        `> ${E.pearl} Pearl × 500\\n` +\n        '> 🏆 ยศ Lv.1\\n\\n' +\n        '**เริ่มผจญภัยได้เลยที่** <#1489522699943284766> 🌍'\n      )\n      .setColor(0x2ECC71)\n      .setFooter({ text: 'Sori Adventure • ระบบตกปลา' })],\n    ephemeral: true,\n  });\n}\n\nasync function handleProfile(interaction) {\n  const userId = interaction.user.id;\n  const player = await db.getPlayer(userId);\n\n  if (!player) {\n    return interaction.reply({\n      embeds: [new EmbedBuilder()\n        .setTitle('❌ ยังไม่ได้ลงทะเบียน')\n        .setDescription('กรุณากดปุ่ม **⚓ เข้าร่วมการผจญภัย** ก่อนนะ!')\n        .setColor(0xE74C3C)],\n      ephemeral: true,\n    });\n  }\n\n  const collection = await db.getCollection(userId);\n  const rodInfo    = RODS[player.rod] || RODS.bamboo_rod;\n  const { CHARMS, FOODS, totalExpForLevel } = require('../data/items');\n  const charmInfo  = player.active_charm ? CHARMS[player.active_charm] : null;\n  const foodInfo   = player.active_food  ? FOODS[player.active_food]   : null;\n\n  const expCurrent = player.exp || 0;\n  const expNext    = totalExpForLevel((player.level || 1) + 1);\n  const expNeeded  = expNext - expCurrent;\n  const rodEmoji   = E[player.rod] || rodInfo.emoji;\n  const charmEmoji = charmInfo ? (E[charmInfo.id] || charmInfo.emoji) : null;\n\n  // EXP bar\n  const pct    = Math.min(1, expCurrent / expNext);\n  const filled = Math.round(pct * 10);\n  const expBar = '🟩'.repeat(filled) + '⬜'.repeat(10 - filled);\n\n  const embed = new EmbedBuilder()\n    .setTitle(`📊 ข้อมูลของ ${interaction.user.username}`)\n    .setThumbnail(interaction.user.displayAvatarURL())\n    .addFields(\n      { name: '🎣 คันเบ็ด',\n        value: `${rodEmoji} ${rodInfo.name}\\n> ⚡พลัง ${rodInfo.power} | 🏃ความเร็ว ${rodInfo.speed} | ${E.luck}โชค ${rodInfo.luck}%`,\n        inline: true },\n      { name: '🍀 เครื่องราง',\n        value: charmInfo ? `${charmEmoji} ${charmInfo.name}` : 'ไม่มี',\n        inline: true },\n      { name: '🍱 อาหาร',\n        value: foodInfo ? `${foodInfo.emoji} ${foodInfo.name}` : 'ไม่มี',\n        inline: true },\n      { name: '🐟 ตกปลาทั้งหมด',  value: `${player.total_fish_caught} ตัว`, inline: true },\n      { name: '⭐ เลเวล',           value: `Lv.${player.level}`, inline: true },\n      { name: '🏅 ความชำนาญ',       value: getExpertiseTitle(player.level), inline: true },\n      { name: '❤️ Stamina',         value: `${player.player_stamina ?? 100}/100`, inline: true },\n      { name: `${E.pearl} Pearl`,   value: `${(player.pearl || 0).toLocaleString()}`, inline: true },\n      { name: '📈 Pearl สะสม',      value: `${(player.total_pearl_earned || 0).toLocaleString()}`, inline: true },\n      { name: `${E.exp} EXP`,\n        value: `${expBar}\\n${expCurrent.toLocaleString()} / ${expNext.toLocaleString()} (อีก ${expNeeded.toLocaleString()})`,\n        inline: false },\n      { name: '📚 คอลเล็กชั่น',     value: `${collection.filter(c=>c.count>0).length} / 45 ชนิด`, inline: true },\n    )\n    .setColor(0x3498DB)\n    .setFooter({ text: 'Sori Adventure • ระบบตกปลา' });\n\n  await interaction.reply({ embeds: [embed], ephemeral: true });\n}\n\nmodule.exports = { handleRegister, handleProfile };\n", "handlers/shop.js": "// shop.js — ร้านค้า หน้าละ 1 สินค้า + thumbnail ขวา\nconst { EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle } = require('discord.js');\nconst db = require('../database');\nconst { RODS, BAITS, CHARMS, FOODS, CHARM_RARITY } = require('../data/items');\nconst E = require('../data/emojis');\n\n// URL รูปสินค้า (ใส่ได้เรื่อยๆ ถ้าไม่มีจะ fallback เป็น null)\nconst ITEM_IMAGES = {\n  bamboo_rod:   null,\n  worm:         null,\n  ruby_amulet:  null,\n  // เพิ่มได้: item_id: 'https://...'\n};\n\n// ── เมนูหลักร้านค้า ──────────────────────────────────────────\nasync function handleShopMenu(interaction) {\n  const embed = new EmbedBuilder()\n    .setTitle('🛒 ร้านค้า')\n    .setDescription('เลือกหมวดหมู่ที่ต้องการ:')\n    .setColor(0xE67E22);\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('shop_page_rod_0').setLabel('คันเบ็ด').setEmoji({ id: '1490026262545043656', name: 'BambooRod1' }).setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('shop_page_bait_0').setLabel('เหยื่อ').setEmoji({ id: '1490030879701995580', name: 'Wormtier1' }).setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('shop_page_charm_0').setLabel('เครื่องราง').setEmoji({ id: '1490027407590031542', name: 'RubyAmulet1' }).setStyle(ButtonStyle.Secondary),\n  );\n\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\n// ── ข้อมูลสินค้าแต่ละประเภท ──────────────────────────────────\nfunction getShopItems(type) {\n  if (type === 'rod')   return Object.values(RODS).filter(r => (r.shop === 'market' || r.shop === 'city') && r.price > 0);\n  if (type === 'bait')  return Object.values(BAITS);\n  // ร้านค้าปกติ: เฉพาะ COMMON และ RARE เท่านั้น (LEGENDARY/ANCIENT อยู่ร้านพิเศษ)\n  if (type === 'charm') return Object.values(CHARMS).filter(c => c.shop === 'charm' && (c.rarity === 'COMMON' || c.rarity === 'RARE'));\n  return [];\n}\n\nfunction buildItemDesc(item, type) {\n  if (type === 'rod') {\n    const luckLine = item.luck ? `| ${E.luck} โชค: **${item.luck}**\\n` : '';\n    return (\n      `⚡ พลัง: **${item.power}** | 🏃 ความเร็ว: **${item.speed}** ${luckLine}` +\n      (item.bonus && Object.keys(item.bonus).length\n        ? `✨ โบนัส: ${Object.entries(item.bonus).filter(([k]) => k !== 'location_bonus').map(([k,v]) => `${k} +${v}`).join(', ')}\\n`\n        : '') +\n      (item.durability ? `⚠️ ทนทาน: **${item.durability}** ครั้ง แล้วพัง!\\n` : '') +\n      (item.requireCollection ? `📚 ต้องสะสมปลา: **${item.requireCollection}** ตัว\\n` : '') +\n      `─────────────────\\n📝 ${item.desc}`\n    );\n  }\n  if (type === 'bait') {\n    const eff = item.effect || {};\n    return (\n      (eff.luck ? `${E.luck} โชค +${eff.luck}\\n` : '') +\n      `─────────────────\\n📝 ${item.desc}`\n    );\n  }\n  if (type === 'charm') {\n    const eff     = item.effect || {};\n    const rarity  = item.rarity ? CHARM_RARITY[item.rarity] : null;\n    const rarityLine = rarity ? `${rarity.emoji()} ระดับ: **${rarity.name}**\\n` : '';\n    const powerLine  = item.power ? `⚡ พลัง: **${item.power}**` : '';\n    const speedLine  = item.speed ? ` | 🏃 ความเร็ว: **${item.speed}**` : '';\n    const luckLine   = item.luck  ? ` | ${E.luck} โชค: **${item.luck}**` : '';\n    const statLine   = (powerLine || speedLine || luckLine) ? (powerLine + speedLine + luckLine + '\\n') : '';\n    return (\n      rarityLine +\n      statLine +\n      (eff.stamina_bonus  ? `❤️ Stamina +${eff.stamina_bonus}\\n`                 : '') +\n      (eff.pearl_bonus    ? `${E.pearl} Pearl +${eff.pearl_bonus}%\\n`             : '') +\n      (eff.exp_bonus      ? `${E.exp} EXP +${eff.exp_bonus}%\\n`                  : '') +\n      (eff.luck_bonus     ? `${E.luck} โชค +${eff.luck_bonus}%\\n`                : '') +\n      (eff.bite_speed     ? `⚡ ปลากินเหยื่อเร็ว +${eff.bite_speed}%\\n`          : '') +\n      (eff.stamina_regen  ? `✨ Passive: ฟื้น Stamina ${eff.stamina_regen}% เมื่อหมด\\n` : '') +\n      (item.requireCollection ? `📚 ต้องสะสมปลา: **${item.requireCollection}** ตัว\\n` : '') +\n      `─────────────────\\n📝 ${item.desc}`\n    );\n  }\n  return item.desc;\n}\n\n// ── หน้าสินค้า ───────────────────────────────────────────────\nasync function handleShopPage(interaction) {\n  const parts   = interaction.customId.replace('shop_page_', '').split('_');\n  const type    = parts[0];\n  const idx     = parseInt(parts[1], 10);\n  const items   = getShopItems(type);\n\n  if (!items.length) return interaction.reply({ content: '❌ ไม่มีสินค้า', ephemeral: true });\n  const safeIdx = Math.min(Math.max(idx, 0), items.length - 1);\n  const item    = items[safeIdx];\n\n  // ใช้ custom emoji ถ้ามี\n  const itemEmoji = E[item.id] || item.emoji;\n\n  const embed = new EmbedBuilder()\n    .setTitle(`${itemEmoji} ${item.name}`)\n    .setDescription(\n      `${buildItemDesc(item, type)}\\n\\n` +\n      `${E.pearl} **ราคา: ${item.price.toLocaleString()} Pearl**`\n    )\n    .setColor(type === 'rod' ? 0x3498DB : type === 'bait' ? 0x27AE60 : 0xF39C12)\n    .setFooter({ text: `สินค้า ${safeIdx + 1}/${items.length}` });\n\n  // thumbnail ขวา — ใช้ CDN อิโมจิ Discord ถ้ามี custom emoji id\n  const emojiId = extractEmojiId(E[item.id]);\n  if (emojiId) {\n    embed.setThumbnail(`https://cdn.discordapp.com/emojis/${emojiId}.png`);\n  } else if (ITEM_IMAGES[item.id]) {\n    embed.setThumbnail(ITEM_IMAGES[item.id]);\n  }\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder()\n      .setCustomId(`shop_buy_${type}_${item.id}`)\n      .setLabel(`ซื้อ ${item.name}`)\n      .setEmoji('✅')\n      .setStyle(ButtonStyle.Success),\n  );\n  if (safeIdx > 0)\n    row.addComponents(new ButtonBuilder().setCustomId(`shop_page_${type}_${safeIdx - 1}`).setLabel('ก่อนหน้า').setEmoji('◀️').setStyle(ButtonStyle.Secondary));\n  if (safeIdx < items.length - 1)\n    row.addComponents(new ButtonBuilder().setCustomId(`shop_page_${type}_${safeIdx + 1}`).setLabel('ถัดไป').setEmoji('▶️').setStyle(ButtonStyle.Primary));\n\n  try {\n    if (interaction.replied || interaction.deferred) {\n      await interaction.editReply({ embeds: [embed], components: [row] });\n    } else {\n      await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n    }\n  } catch (e) {\n    await interaction.update({ embeds: [embed], components: [row] }).catch(() => {});\n  }\n}\n\n// ── ซื้อสินค้า ───────────────────────────────────────────────\nasync function handleBuyItem(interaction) {\n  const parts    = interaction.customId.replace('shop_buy_', '').split('_');\n  const itemType = parts[0];\n  const itemId   = parts.slice(1).join('_');\n  const ALL      = { ...RODS, ...BAITS, ...CHARMS, ...FOODS };\n  const item     = ALL[itemId];\n  if (!item) return interaction.reply({ content: '❌ ไม่พบสินค้า', ephemeral: true });\n\n  const player = await db.getPlayer(interaction.user.id);\n  if (!player) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน', ephemeral: true });\n\n  if ((player.pearl || 0) < item.price) {\n    return interaction.reply({\n      embeds: [new EmbedBuilder()\n        .setTitle('❌ Pearl ไม่พอ!')\n        .setDescription(`ต้องการ **${item.price.toLocaleString()}** ${E.pearl} แต่มี **${(player.pearl||0).toLocaleString()}**`)\n        .setColor(0xE74C3C)],\n      ephemeral: true,\n    });\n  }\n\n  await db.updatePlayer(interaction.user.id, { pearl: (player.pearl || 0) - item.price });\n  await db.addToInventory(interaction.user.id, itemType, itemId, 1);\n  if (itemType === 'rod') await db.updatePlayer(interaction.user.id, { rod: itemId });\n\n  const itemEmoji = E[itemId] || item.emoji;\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ ซื้อสำเร็จ!')\n      .setDescription(`ได้รับ ${itemEmoji} **${item.name}**!\\n${E.pearl} Pearl คงเหลือ: **${((player.pearl||0) - item.price).toLocaleString()}**`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ── helper: ดึง emoji id จาก <:name:id> ──────────────────────\nfunction extractEmojiId(emojiStr) {\n  if (!emojiStr) return null;\n  const match = emojiStr.match(/:(\\d+)>/);\n  return match ? match[1] : null;\n}\n\n// ── Main router ──────────────────────────────────────────────\nasync function handleShop(interaction) {\n  const id = interaction.customId;\n  if (id === 'menu_shop')          return handleShopMenu(interaction);\n  if (id.startsWith('shop_page_')) return handleShopPage(interaction);\n  if (id.startsWith('shop_buy_'))  return handleBuyItem(interaction);\n}\n\nmodule.exports = { handleShopMenu, handleShop };\n", "handlers/special_shop.js": "// special_shop.js — ร้านค้าพิเศษ ควบคุมโดย Admin\n// Admin ใช้ /เซ็ตขายของร้านค้าพิเศษ เพื่อตั้งสินค้า\n// ผู้เล่นเลือกซื้อในช่อง 1490641986909245501\n// ร้านมีเวลาหมดอายุ → ลบข้อความอัตโนมัติ\n\nconst {\n  EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle,\n  StringSelectMenuBuilder,\n} = require('discord.js');\nconst db = require('../database');\nconst { RODS, BAITS, CHARMS, FOODS, CHARM_RARITY } = require('../data/items');\nconst E = require('../data/emojis');\n\nconst ADMIN_SETUP_CHANNEL  = '1490642362282803261';\nconst SHOP_DISPLAY_CHANNEL = '1490641986909245501';\nconst OWNER_ID             = '1131982129039954091';\n\n// ── สถานะร้านค้าพิเศษ (in-memory) ──────────────────────────\nlet specialShopState = {\n  active:    false,\n  items:     [],       // [{ type, id, price, stock }]\n  messageId: null,     // message id ใน SHOP_DISPLAY_CHANNEL\n  setupMsgId:null,     // message id ใน ADMIN_SETUP_CHANNEL\n  expiresAt: null,     // timestamp\n  timer:     null,     // setTimeout handle\n};\n\n// ── รายการไอเทมที่อนุญาตให้ขายในร้านพิเศษ ──────────────────\n// ไม่รวม: คันเบ็ดธรรมดา (shop: 'city'/'market'), rod จาก event/แร้ง, ไอเทม Event\nfunction getAllowedItems() {\n  const allowed = [];\n\n  // เครื่องราง (ทุกระดับรวมถึง LEGENDARY และ ANCIENT)\n  for (const [id, item] of Object.entries(CHARMS)) {\n    if (item.shop === null) continue; // ข้ามของรางวัล\n    allowed.push({ type: 'charm', id, item });\n  }\n\n  // เหยื่อ\n  for (const [id, item] of Object.entries(BAITS)) {\n    allowed.push({ type: 'bait', id, item });\n  }\n\n  // อาหาร\n  for (const [id, item] of Object.entries(FOODS)) {\n    allowed.push({ type: 'food', id, item });\n  }\n\n  // ปลา — ดึงจาก fish.js แบบ dynamic\n  try {\n    const { FISH_LIST } = require('../data/fish');\n    for (const fish of FISH_LIST) {\n      allowed.push({ type: 'fish', id: fish.id, item: { ...fish, sell: Math.floor(fish.basePrice * 0.8) } });\n    }\n  } catch {}\n\n  return allowed;\n}\n\n// ── helper: สร้าง embed สินค้า ────────────────────────────────\nfunction buildShopItemEmbed(entry, index, total, stock) {\n  const { type, item } = entry;\n  const charmRarity = type === 'charm' && item.rarity ? CHARM_RARITY[item.rarity] : null;\n  const rarityEmoji = charmRarity ? charmRarity.emoji() : '';\n  const itemEmoji   = E[item.id] || item.emoji || '🎁';\n  const color       = charmRarity ? charmRarity.color : 0xE67E22;\n\n  let statsLine = '';\n  if (type === 'charm') {\n    const p = item.power  || 0;\n    const s = item.speed  || 0;\n    const l = item.luck   || 0;\n    statsLine = `⚡ พลัง: **${p}** | 🏃 ความเร็ว: **${s}** | ${E.luck} โชค: **${l}**\\n`;\n    if (item.effect?.pearl_bonus) statsLine += `${E.pearl} Pearl +${item.effect.pearl_bonus}%\\n`;\n    if (item.effect?.exp_bonus)   statsLine += `${E.exp} EXP +${item.effect.exp_bonus}%\\n`;\n    if (item.effect?.bite_speed)  statsLine += `⚡ ปลากินเหยื่อเร็ว +${item.effect.bite_speed}%\\n`;\n    if (item.effect?.stamina_bonus) statsLine += `❤️ Stamina +${item.effect.stamina_bonus}\\n`;\n    if (item.effect?.luck_bonus)  statsLine += `${E.luck} โชค +${item.effect.luck_bonus}%\\n`;\n    if (item.effect?.stamina_regen) statsLine += `✨ Passive: ฟื้น Stamina ${item.effect.stamina_regen}% เมื่อหมด\\n`;\n    if (item.effect?.location_bonus) statsLine += `📍 มีโบนัสพิเศษตามสถานที่\\n`;\n    if (item.dropChance) {\n      const frac = Math.round(1 / item.dropChance).toLocaleString();\n      statsLine += `💧 ดรอปได้จากปลา 1/${frac}\\n`;\n    }\n  } else if (type === 'rod') {\n    statsLine = `⚡ พลัง: **${item.power}** | 🏃 ความเร็ว: **${item.speed}**`;\n    if (item.luck) statsLine += ` | ${E.luck} โชค: **${item.luck}**`;\n    statsLine += '\\n';\n  }\n\n  const embed = new EmbedBuilder()\n    .setTitle(`${rarityEmoji} ${itemEmoji} ${item.name}`)\n    .setDescription(\n      `${statsLine}─────────────────\\n📝 ${item.desc || '-'}\\n\\n` +\n      `${E.pearl} **ราคา: ${entry.price.toLocaleString()} Pearl**\\n` +\n      `📦 คงเหลือ: **${stock > 0 ? stock : '∞'}** ชิ้น`\n    )\n    .setColor(color)\n    .setFooter({ text: `สินค้า ${index + 1}/${total} • ร้านค้าพิเศษ` });\n\n  // thumbnail จาก emoji CDN\n  const emojiIdMatch = (E[item.id] || item.emoji || '').match(/:(\\d+)>/);\n  if (emojiIdMatch) embed.setThumbnail(`https://cdn.discordapp.com/emojis/${emojiIdMatch[1]}.png`);\n\n  return embed;\n}\n\n// ── /เซ็ตขายของร้านค้าพิเศษ ─────────────────────────────────\nasync function handleSetSpecialShop(interaction) {\n  // Admin (permission Administrator) ใช้ได้\n  if (!interaction.member?.permissions?.has('Administrator')) {\n    return interaction.reply({ content: '❌ ต้องมีสิทธิ์ Administrator ถึงจะใช้คำสั่งนี้ได้!', ephemeral: true });\n  }\n\n  // ต้องใช้ในช่องที่กำหนด\n  if (interaction.channelId !== ADMIN_SETUP_CHANNEL) {\n    return interaction.reply({\n      content: `❌ ต้องใช้คำสั่งนี้ในช่อง <#${ADMIN_SETUP_CHANNEL}> เท่านั้น!`,\n      ephemeral: true,\n    });\n  }\n\n  const allowed = getAllowedItems();\n\n  // แสดง Select Menu เลือกหมวดหมู่ก่อน\n  const embed = new EmbedBuilder()\n    .setTitle('🏪 ตั้งค่าร้านค้าพิเศษ')\n    .setDescription(\n      'เลือกหมวดหมู่สินค้าที่จะขายในร้านค้าพิเศษ\\n\\n' +\n      `📦 สินค้าที่เลือกไว้: **0** ชิ้น\\n\\n` +\n      '> เครื่องราง LEGENDARY และ ANCIENT สามารถขายได้ที่นี่\\n' +\n      '> ไม่สามารถขายคันเบ็ดธรรมดา, Event Rod หรือของรางวัลแร้งได้'\n    )\n    .setColor(0xF39C12);\n\n  const categoryRow = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('sshop_setup_charm').setLabel('เครื่องราง').setEmoji('💎').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('sshop_setup_bait').setLabel('เหยื่อ').setEmoji('🪱').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('sshop_setup_food').setLabel('อาหาร').setEmoji('🍱').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('sshop_setup_fish').setLabel('ปลา').setEmoji('🐟').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('sshop_setup_confirm').setLabel('ยืนยันและเปิดร้าน').setEmoji('✅').setStyle(ButtonStyle.Danger),\n  );\n\n  // เก็บ pending setup state ใน memory\n  specialShopState.pendingItems = [];\n\n  await interaction.reply({ embeds: [embed], components: [categoryRow], ephemeral: true });\n}\n\n// ── เลือกสินค้าในหมวดหมู่ ────────────────────────────────────\nasync function handleSetupCategory(interaction) {\n  if (!interaction.member?.permissions?.has('Administrator'))\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const category = interaction.customId.replace('sshop_setup_', '');\n\n  if (category === 'confirm') return handleSetupConfirm(interaction);\n\n  const allowed = getAllowedItems().filter(e => e.type === category);\n  if (!allowed.length)\n    return interaction.reply({ content: '❌ ไม่มีสินค้าในหมวดนี้', ephemeral: true });\n\n  // สร้าง select menu (max 25 options)\n  const options = allowed.slice(0, 25).map(e => {\n    const charmRarity = e.type === 'charm' && e.item.rarity ? CHARM_RARITY[e.item.rarity] : null;\n    const rarityLabel = charmRarity ? `[${charmRarity.name}] ` : '';\n    const emojiIdMatch = (E[e.item.id] || e.item.emoji || '').match(/<:[^:]+:(\\d+)>/);\n    const opt = {\n      label: `${rarityLabel}${e.item.name}`.slice(0, 100),\n      value: `${e.type}__${e.id}`,\n      description: (e.item.desc || '').slice(0, 100),\n    };\n    if (emojiIdMatch) opt.emoji = { id: emojiIdMatch[1] };\n    return opt;\n  });\n\n  const row = new ActionRowBuilder().addComponents(\n    new StringSelectMenuBuilder()\n      .setCustomId('sshop_item_select')\n      .setPlaceholder('เลือกสินค้าที่ต้องการขาย (เลือกได้หลายครั้ง)')\n      .setOptions(options)\n  );\n\n  const categoryNames = { charm: 'เครื่องราง', bait: 'เหยื่อ', food: 'อาหาร', fish: 'ปลา' };\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle(`เลือก${categoryNames[category] || category}`)\n      .setDescription('เลือกสินค้าที่ต้องการเพิ่มในร้านค้าพิเศษ\\nสามารถกลับมาเลือกซ้ำเพื่อเพิ่มสินค้าจากหมวดอื่น')\n      .setColor(0x3498DB)],\n    components: [row],\n    ephemeral: true,\n  });\n}\n\n// ── รับการเลือกสินค้า → เปิด Modal กำหนดราคา+จำนวน ──────────\nasync function handleItemSelect(interaction) {\n  if (!interaction.member?.permissions?.has('Administrator'))\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const selected = interaction.values[0];\n  const [type, id] = selected.split('__');\n\n  // หา item — ต้อง require fish แบบ sync ให้ถูกต้อง\n  const all = { ...CHARMS, ...BAITS, ...FOODS };\n  let item = all[id];\n  if (!item) {\n    try {\n      const { FISH_LIST } = require('../data/fish');\n      item = FISH_LIST.find(f => f.id === id);\n    } catch (e) { console.error('fish load error', e); }\n  }\n  if (!item) return interaction.reply({ content: `❌ ไม่พบสินค้า (${id})`, ephemeral: true });\n\n  const defaultPrice = item.price ?? item.basePrice ?? 0;\n  const itemName = item.name || id;\n\n  // ใช้ Modal เพื่อรับ ราคา + จำนวน — ไม่ต้องกดปุ่มซ้ำ ลด interaction chain\n  const { ModalBuilder, TextInputBuilder, TextInputStyle } = require('discord.js');\n  const modal = new ModalBuilder()\n    .setCustomId(`sshop_modal__${type}__${id}`)\n    .setTitle(`ตั้งราคา: ${itemName}`.slice(0, 45));\n\n  modal.addComponents(\n    new ActionRowBuilder().addComponents(\n      new TextInputBuilder()\n        .setCustomId('price')\n        .setLabel(`ราคา (ปกติ ${defaultPrice.toLocaleString()})`)\n        .setStyle(TextInputStyle.Short)\n        .setPlaceholder(String(defaultPrice))\n        .setValue(String(defaultPrice))\n        .setRequired(true)\n    ),\n    new ActionRowBuilder().addComponents(\n      new TextInputBuilder()\n        .setCustomId('stock')\n        .setLabel('จำนวนสต็อก (0 = ไม่จำกัด)')\n        .setStyle(TextInputStyle.Short)\n        .setPlaceholder('0')\n        .setValue('0')\n        .setRequired(true)\n    ),\n  );\n\n  await interaction.showModal(modal);\n}\n\n// ── รับ Modal submit กำหนดราคา+จำนวน ────────────────────────\nasync function handleSetPriceModal(interaction) {\n  if (!interaction.member?.permissions?.has('Administrator'))\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  // customId: sshop_modal__TYPE__ID\n  const parts = interaction.customId.replace('sshop_modal__', '').split('__');\n  const type  = parts[0];\n  const id    = parts[1];\n\n  const price = parseInt(interaction.fields.getTextInputValue('price'), 10);\n  const stock = parseInt(interaction.fields.getTextInputValue('stock'), 10);\n\n  if (isNaN(price) || price < 0)\n    return interaction.reply({ content: '❌ ราคาไม่ถูกต้อง ต้องเป็นตัวเลข', ephemeral: true });\n\n  const stockVal = isNaN(stock) ? 0 : Math.max(0, stock);\n\n  if (!specialShopState.pendingItems) specialShopState.pendingItems = [];\n  if (specialShopState.pendingItems.find(e => e.id === id)) {\n    return interaction.reply({ content: `⚠️ สินค้านี้อยู่ในรายการแล้ว`, ephemeral: true });\n  }\n\n  specialShopState.pendingItems.push({ type, id, price, stock: stockVal });\n\n  const all = { ...CHARMS, ...BAITS, ...FOODS };\n  let item = all[id];\n  if (!item) {\n    try { const { FISH_LIST } = require('../data/fish'); item = FISH_LIST.find(f => f.id === id); } catch {}\n  }\n  const name = item?.name || id;\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ เพิ่มสินค้าแล้ว')\n      .setDescription(\n        `เพิ่ม **${name}** ราคา **${price.toLocaleString()}** pearl\\n` +\n        `จำนวน: **${stockVal > 0 ? stockVal : 'ไม่จำกัด'}** ชิ้น\\n\\n` +\n        `📦 สินค้าในรายการปัจจุบัน: **${specialShopState.pendingItems.length}** ชิ้น\\n\\n` +\n        'กลับไปเลือกสินค้าเพิ่มได้ หรือกด **\"ยืนยันและเปิดร้าน\"** จากเมนูตั้งค่า'\n      )\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ── ยืนยันและเปิดร้านค้า ──────────────────────────────────────\nasync function handleSetupConfirm(interaction) {\n  if (interaction.user.id !== OWNER_ID)\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const pending = specialShopState.pendingItems || [];\n  if (!pending.length)\n    return interaction.reply({ content: '❌ ยังไม่ได้เลือกสินค้าเลย!', ephemeral: true });\n\n  // ขอกำหนดเวลา\n  const timeRow = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('sshop_open__300').setLabel('5 นาที').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('sshop_open__600').setLabel('10 นาที').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('sshop_open__1800').setLabel('30 นาที').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('sshop_open__3600').setLabel('1 ชั่วโมง').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('sshop_open__0').setLabel('ไม่จำกัดเวลา').setStyle(ButtonStyle.Danger),\n  );\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('⏰ กำหนดเวลาร้านค้า')\n      .setDescription(`สินค้า **${pending.length}** ชิ้น พร้อมแล้ว\\nเลือกเวลาที่ร้านค้าจะเปิด`)\n      .setColor(0xF39C12)],\n    components: [timeRow],\n    ephemeral: true,\n  });\n}\n\n// ── เปิดร้านค้าพิเศษจริงๆ ────────────────────────────────────\nasync function handleOpenShop(interaction) {\n  if (!interaction.member?.permissions?.has('Administrator'))\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const durationSec = parseInt(interaction.customId.replace('sshop_open__', ''), 10);\n  const pending     = specialShopState.pendingItems || [];\n\n  if (!pending.length)\n    return interaction.reply({ content: '❌ ไม่มีสินค้า', ephemeral: true });\n\n  // ปิดร้านเก่าถ้ามี\n  await closeSpecialShop(interaction.client, false);\n\n  // ตั้งค่า state\n  specialShopState.active    = true;\n  specialShopState.items     = [...pending];\n  specialShopState.pendingItems = [];\n  specialShopState.expiresAt = durationSec > 0 ? Date.now() + durationSec * 1000 : null;\n\n  // ส่งข้อความร้านค้าใน SHOP_DISPLAY_CHANNEL\n  const shopChannel = interaction.client.channels.cache.get(SHOP_DISPLAY_CHANNEL);\n  if (!shopChannel) {\n    return interaction.reply({ content: `❌ ไม่พบช่อง <#${SHOP_DISPLAY_CHANNEL}>`, ephemeral: true });\n  }\n\n  const { embed, components } = buildShopPageUI(0);\n  const shopMsg = await shopChannel.send({ embeds: [embed], components });\n  specialShopState.messageId = shopMsg.id;\n\n  // ตั้ง timer ถ้ามีเวลา\n  if (durationSec > 0) {\n    if (specialShopState.timer) clearTimeout(specialShopState.timer);\n    specialShopState.timer = setTimeout(() => {\n      closeSpecialShop(interaction.client, true);\n    }, durationSec * 1000);\n  }\n\n  const expireText = durationSec > 0\n    ? `ร้านจะหมดเวลาใน **${durationSec >= 3600 ? `${durationSec/3600} ชั่วโมง` : `${durationSec/60} นาที`}**`\n    : 'ร้านเปิดโดยไม่จำกัดเวลา';\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ เปิดร้านค้าพิเศษแล้ว!')\n      .setDescription(`สินค้า **${specialShopState.items.length}** ชิ้น\\n${expireText}\\n\\n<#${SHOP_DISPLAY_CHANNEL}>`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ── สร้าง UI ร้านค้า ─────────────────────────────────────────\nfunction buildShopPageUI(idx) {\n  const items = specialShopState.items;\n  const safeIdx = Math.min(Math.max(idx, 0), items.length - 1);\n  const entry   = items[safeIdx];\n\n  const all  = { ...CHARMS, ...BAITS, ...FOODS };\n  let item   = all[entry.id];\n  if (!item) {\n    try {\n      const { FISH_LIST } = require('../data/fish');\n      item = FISH_LIST.find(f => f.id === entry.id);\n    } catch {}\n  }\n  if (!item) item = { name: entry.id, desc: '-', emoji: '🎁' };\n\n  const stock = entry.stock > 0 ? entry.stock : 0;\n  const mockEntry = { type: entry.type, id: entry.id, price: entry.price, item, stock };\n  const embed = buildShopItemEmbed(mockEntry, safeIdx, items.length, stock);\n\n  // เพิ่ม expire time\n  if (specialShopState.expiresAt) {\n    const remaining = Math.max(0, Math.round((specialShopState.expiresAt - Date.now()) / 1000));\n    const mins = Math.floor(remaining / 60);\n    const secs = remaining % 60;\n    embed.setFooter({ text: `สินค้า ${safeIdx+1}/${items.length} • ร้านปิดใน ${mins}:${String(secs).padStart(2,'0')} นาที` });\n  }\n\n  const rows = [];\n  const navRow = new ActionRowBuilder();\n\n  navRow.addComponents(\n    new ButtonBuilder()\n      .setCustomId(`sshop_buy_${safeIdx}`)\n      .setLabel(`ซื้อ ${item.name}`)\n      .setEmoji('✅')\n      .setStyle(ButtonStyle.Success)\n  );\n  if (safeIdx > 0)\n    navRow.addComponents(new ButtonBuilder().setCustomId(`sshop_page_${safeIdx-1}`).setLabel('ก่อนหน้า').setEmoji('◀️').setStyle(ButtonStyle.Secondary));\n  if (safeIdx < items.length - 1)\n    navRow.addComponents(new ButtonBuilder().setCustomId(`sshop_page_${safeIdx+1}`).setLabel('ถัดไป').setEmoji('▶️').setStyle(ButtonStyle.Primary));\n\n  rows.push(navRow);\n  return { embed, components: rows };\n}\n\n// ── ผู้เล่นกดซื้อ ────────────────────────────────────────────\nasync function handlePlayerBuy(interaction) {\n  if (!specialShopState.active)\n    return interaction.reply({ content: '❌ ร้านค้าพิเศษปิดแล้ว', ephemeral: true });\n\n  const idx   = parseInt(interaction.customId.replace('sshop_buy_', ''), 10);\n  const entry = specialShopState.items[idx];\n  if (!entry) return interaction.reply({ content: '❌ ไม่พบสินค้า', ephemeral: true });\n\n  const player = await db.getPlayer(interaction.user.id);\n  if (!player) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน!', ephemeral: true });\n  if (player.is_banned) return interaction.reply({ content: '🚫 บัญชีถูกแบน', ephemeral: true });\n\n  if ((player.pearl || 0) < entry.price) {\n    return interaction.reply({\n      embeds: [new EmbedBuilder()\n        .setTitle('❌ Pearl ไม่พอ!')\n        .setDescription(`ต้องการ **${entry.price.toLocaleString()}** ${E.pearl} แต่มี **${(player.pearl||0).toLocaleString()}**`)\n        .setColor(0xE74C3C)],\n      ephemeral: true,\n    });\n  }\n\n  // ตรวจ stock\n  if (entry.stock > 0) {\n    if (entry.stock <= 0) {\n      return interaction.reply({ content: '❌ สินค้าหมดแล้ว!', ephemeral: true });\n    }\n    entry.stock--;\n  }\n\n  await db.updatePlayer(interaction.user.id, { pearl: (player.pearl || 0) - entry.price });\n  await db.addToInventory(interaction.user.id, entry.type, entry.id, 1);\n\n  const all  = { ...CHARMS, ...BAITS, ...FOODS };\n  let item   = all[entry.id];\n  if (!item) {\n    try { const { FISH_LIST } = require('../data/fish'); item = FISH_LIST.find(f => f.id === entry.id); } catch {}\n  }\n  const name  = item?.name || entry.id;\n  const emoji = E[entry.id] || item?.emoji || '🎁';\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ ซื้อสำเร็จ!')\n      .setDescription(\n        `ได้รับ ${emoji} **${name}** จากร้านค้าพิเศษ!\\n` +\n        `${E.pearl} Pearl คงเหลือ: **${((player.pearl||0) - entry.price).toLocaleString()}**`\n      )\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n\n  // อัปเดตข้อความร้านค้าถ้า stock เปลี่ยน\n  if (entry.stock > 0 || entry.stock === 0) {\n    try {\n      const shopChannel = interaction.client.channels.cache.get(SHOP_DISPLAY_CHANNEL);\n      if (shopChannel && specialShopState.messageId) {\n        const msg = await shopChannel.messages.fetch(specialShopState.messageId).catch(() => null);\n        if (msg) {\n          const { embed, components } = buildShopPageUI(idx);\n          await msg.edit({ embeds: [embed], components }).catch(() => {});\n        }\n      }\n    } catch {}\n  }\n}\n\n// ── เปลี่ยนหน้าร้านค้า ───────────────────────────────────────\nasync function handlePageChange(interaction) {\n  if (!specialShopState.active)\n    return interaction.reply({ content: '❌ ร้านค้าพิเศษปิดแล้ว', ephemeral: true });\n\n  const idx = parseInt(interaction.customId.replace('sshop_page_', ''), 10);\n  const { embed, components } = buildShopPageUI(idx);\n\n  try {\n    await interaction.update({ embeds: [embed], components });\n  } catch {\n    await interaction.reply({ embeds: [embed], components, ephemeral: true });\n  }\n}\n\n// ── ปิดร้านค้าพิเศษ ─────────────────────────────────────────\nasync function closeSpecialShop(client, expired = false) {\n  if (!specialShopState.active) return;\n\n  specialShopState.active = false;\n  if (specialShopState.timer) {\n    clearTimeout(specialShopState.timer);\n    specialShopState.timer = null;\n  }\n\n  try {\n    const shopChannel = client.channels.cache.get(SHOP_DISPLAY_CHANNEL);\n    if (shopChannel && specialShopState.messageId) {\n      const msg = await shopChannel.messages.fetch(specialShopState.messageId).catch(() => null);\n      if (msg) await msg.delete().catch(() => {});\n    }\n  } catch {}\n\n  specialShopState.messageId = null;\n  specialShopState.items     = [];\n  specialShopState.expiresAt = null;\n\n  if (expired) {\n    try {\n      const adminChannel = client.channels.cache.get(ADMIN_SETUP_CHANNEL);\n      if (adminChannel) {\n        await adminChannel.send({\n          embeds: [new EmbedBuilder()\n            .setTitle('⏰ ร้านค้าพิเศษหมดเวลาแล้ว')\n            .setDescription('ข้อความร้านค้าถูกลบออกแล้ว ใช้ /เซ็ตขายของร้านค้าพิเศษ เพื่อเปิดร้านใหม่')\n            .setColor(0xE74C3C)],\n        });\n      }\n    } catch {}\n  }\n}\n\n// ── Main router ──────────────────────────────────────────────\nasync function handleSpecialShop(interaction) {\n  const id = interaction.customId;\n  if (id.startsWith('sshop_setup_'))  return handleSetupCategory(interaction);\n  if (id.startsWith('sshop_open__'))  return handleOpenShop(interaction);\n  if (id.startsWith('sshop_buy_'))    return handlePlayerBuy(interaction);\n  if (id.startsWith('sshop_page_'))   return handlePageChange(interaction);\n}\n\n// Modal submit router (เรียกจาก index.js isModalSubmit)\nasync function handleSpecialShopModal(interaction) {\n  if (interaction.customId.startsWith('sshop_modal__')) return handleSetPriceModal(interaction);\n}\n\n// StringSelectMenu router (เรียกจาก index.js isStringSelectMenu)\nasync function handleSpecialShopSelect(interaction) {\n  if (interaction.customId === 'sshop_item_select') return handleItemSelect(interaction);\n}\n\nmodule.exports = {\n  handleSetSpecialShop,\n  handleSpecialShop,\n  handleSpecialShopModal,\n  handleSpecialShopSelect,\n  closeSpecialShop,\n  ADMIN_SETUP_CHANNEL,\n  SHOP_DISPLAY_CHANNEL,\n};\n", "handlers/updatelog.js": "const { EmbedBuilder } = require('discord.js');\n\nconst UPDATE_CHANNEL = '1489964234065317948';\nconst DEVELOPER      = 'ZhenZzJ';\n\nconst CURRENT_UPDATE = {\n  version: 'v1.8.2',\n  date: new Date().toLocaleDateString('th-TH', {\n    year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok',\n  }),\n  time: new Date().toLocaleTimeString('th-TH', {\n    hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok',\n  }),\n  changes: [\n    '💎 เพิ่มระดับเครื่องราง 4 ระดับ (ธรรมดา/หายาก/ตำนาน/โบราณ) พร้อม Custom Emoji แสดงระดับเหมือนระดับปลา',\n    '🛍️ เพิ่มเครื่องรางใหม่ 2 ชิ้น: สร้อยไข่มุก <:Pearlnecklace:1490646453956120627> และ แหวนทอง <:Goldenring:1490645039154593922> (ระดับธรรมดา)',\n    '⚔️ ปรับ stats เครื่องรางและคันเบ็ดทุกชิ้นใหม่ให้เป็นหน่วย (ไม่ใช่ %) — พลัง/ความเร็ว/โชคเป็นค่าตรง',\n    '🎣 เพิ่มคันเบ็ดใหม่ 7 ชิ้น: คันเบ็ดคาร์บอน, ทอง, Lucky, น้ำแข็ง, Obsidian (พัง 50 ครั้ง), ไทเทเนียม, คริสตัล และ Shimano Stella Rod',\n    '🏺 เพิ่ม Ancient Rod (Event) — ดรอปจากการตกปลา 1/25,000,000 ทุกสถานที่',\n    '🗺️ เพิ่มสถานที่ใหม่ 2 แห่ง: แอนตาร์กติกา ❄️ และ ทะเลเปิด 🌊',\n    '🐛 แก้บัค: Stamina ปลาแสดงเป็น [object Object]NaN — ปรับ calcFishStamina ให้อ่านค่า min/max ได้ถูกต้อง',\n    '🐛 แก้บัค: ตลาด — ระดับและประเภทปลาแสดงเป็น E.rarity_rare แทน emoji จริง',\n    '🐛 แก้บัค: ร้านค้าพิเศษ — บอทดับเมื่อขายปลา และกำหนดราคาเองไม่ได้ เปลี่ยนเป็น Modal input แทน',\n    '🎁 เพิ่มคำสั่ง /แอดของ (Owner เท่านั้น) — แอดไอเทมทุกชนิด ไพศาล ปลาขนาดใหญ่อาศัยอยู่ที่นี่\\n🐋 โอกาสเจอปลาขนาดใหญ่และหนักเป็นพิเศษ',\n    color: 0x0056A3,\n    image: 'https://cdn.discordapp.com/attachments/1481868882846158955/1490599453101396058/d183984c0af4e48892cabf35761155ef.jpg?ex=69d4a46b&is=69d352eb&hm=b7b75665dd79c8f5c6759c821b32291459a9bc316ef8678f74330d0770b66cb9&',\n    luck_bonus: 0,\n  },\n};\n\n// ===== สุ่มน้ำหนักปลา =====\nfunction rollWeight(rarity) {\n  const r = RARITY[rarity];\n  const ratio = Math.random();\n  const weight = parseFloat((r.weightMin + ratio * (r.weightMax - r.weightMin)).toFixed(2));\n  return { weight, weightRatio: ratio };\n}\n\n// คำนวณ fishStamina จาก range min-max ของ rarity + น้ำหนัก\nfunction calcFishStamina(rarity, weightRatio) {\n  const r = RARITY[rarity];\n  const sMin = r.stamina.min;\n  const sMax = r.stamina.max;\n  return Math.floor(sMin + weightRatio * (sMax - sMin));\n}\n\n// คำนวณราคาปลาจาก basePrice + น้ำหนัก (หนักสุด +100%)\nfunction calcFishPrice(fish, weightRatio) {\n  const base = fish.basePrice;\n  return base + Math.floor(base * weightRatio);\n}\n\nfunction rollRarity(luckBonus = 0) {\n  const shift = Math.min(luckBonus, 40);\n  const chances = {\n    COMMON:    Math.max(0, 50 - shift),\n    RARE:      40 + Math.floor(shift * 0.55),\n    LEGENDARY: 9  + Math.floor(shift * 0.35),\n    ANCIENT:   1  + Math.floor(shift * 0.10),\n  };\n  const roll = Math.random() * 100;\n  let cum = 0;\n  for (const [r, c] of Object.entries(chances)) {\n    cum += c;\n    if (roll < cum) return r;\n  }\n  return 'COMMON';\n}\n\nfunction rollFishFromRarity(rarity) {\n  const pool = FISH_BY_RARITY[rarity] || FISH_BY_RARITY.COMMON;\n  return pool[Math.floor(Math.random() * pool.length)];\n}\n\nfunction rollFish(luckBonus = 0) {\n  const rarity = rollRarity(luckBonus);\n  const fish   = rollFishFromRarity(rarity);\n  const { weight, weightRatio } = rollWeight(rarity);\n  const fishStamina = calcFishStamina(rarity, weightRatio);\n  const price       = calcFishPrice(fish, weightRatio);\n  return { fish: { ...fish, price }, rarity, weight, weightRatio, fishStamina };\n}\n\nmodule.exports = {\n  FISH_LIST, FISH_BY_RARITY, LOCATIONS, RARITY,\n  rollFish, rollRarity, rollFishFromRarity, rollWeight,\n  calcFishStamina, calcFishPrice,\n};\n", "data/items.js": "// ====================================================\n//  items.js — คันเบ็ด เหยื่อ เครื่องราง อาหาร\n//\n//  คันเบ็ด stats (หน่วย):\n//    power  = ลด stamina ปลาต่อดึง (หน่วย)\n//    speed  = ลดเวลา bite delay (หน่วย)\n//    luck   = โชค (เฉพาะบางอัน, หน่วย) — stat พิเศษเฉพาะคันเบ็ด\n//\n//  เครื่องราง stats (หน่วย):\n//    power        = พลัง (หน่วย)\n//    speed        = ความเร็ว (หน่วย)\n//    luck         = โชค (หน่วย)\n//    stamina_bonus= Stamina ผู้เล่น (หน่วย)\n//    pearl_bonus  = % โบนัส pearl\n//    exp_bonus    = % โบนัส EXP\n//    bite_speed   = % ปลากินเหยื่อเร็วขึ้น\n//    location_bonus = โบนัสพิเศษเฉพาะสถานที่\n//    stamina_regen  = passive ฟื้น stamina เมื่อหมด (%)\n//    durability     = จำนวนครั้งที่ใช้ได้ก่อนพัง (null = ไม่มี)\n//\n//  ระดับเครื่องราง:\n//    COMMON    — ซื้อได้ในร้านค้าปกติ\n//    RARE      — ซื้อได้ในร้านค้าปกติ\n//    LEGENDARY — ซื้อได้เฉพาะร้านค้าพิเศษ (admin) หรือดรอปจากปลา 1/1000\n//    ANCIENT   — ซื้อได้เฉพาะร้านค้าพิเศษ (admin) หรือดรอปจากปลา 1/500,000\n// ====================================================\n\n// ── คันเบ็ดปกติ (ซื้อขายได้, ขายคืนไม่ได้ยกเว้น Event) ──────\nconst RODS = {\n  // ── ระดับ 1 (ฟรี) ──\n  bamboo_rod: {\n    id: 'bamboo_rod', name: 'คันเบ็ดไม้ไผ่', emoji: '<:BambooRod1:1490026262545043656>',\n    desc: 'ไม้ที่สร้างจากไม้ไผ่ ไม่เหมาะกับการตกปลาเท่าไหร่ แต่ก็เป็นจุดเริ่มต้นที่ดีนะ',\n    price: 0, sell: 0, shop: 'city', sellable: false,\n    power: 20, speed: 14, luck: 0,\n    bonus: {},\n  },\n  // ── ระดับ 2 ──\n  carbon_rod: {\n    id: 'carbon_rod', name: 'คันเบ็ดคาร์บอน', emoji: '🎣',\n    desc: 'คันเบ็ดน้ำหนักเบาแต่แข็งแรงกว่าที่คิด รับแรงดึงได้ดี ช่วยให้คุมปลาดิ้นได้ง่ายขึ้น เหมาะกับคนที่เริ่มจริงจังกับการตกปลา',\ cipe: { fish_rarity: 'RARE', fish_count: 1 },\n  },\n  legendary_feast: {\n    id: 'legendary_feast', name: 'หัวปลาเเซลมอน', emoji: '🎂',\n    desc: 'EXP +150 Pearl +200 โชค +12 ครั้งถัดไป | ทำจาก: ปลาตำนาน ×1',\n    price: 1000, sell: 300, shop: 'food',\n    effect: { exp: 150, pearl: 200, temp_luck: 12 },\n    craftable: true,\n    recipe: { fish_rarity: 'LEGENDARY', fish_count: 1 },\n  },\n  explorer_meal: {\n    id: 'explorer_meal', name: 'อาหารนักผจญภัยMRE', emoji: '🍱',\n    desc: 'EXP +50 โชค +10 ครั้งถัดไป | ทำจาก: ปลาธรรมดา ×2',\n    price: 200, sell: 50, shop: 'food',\n    effect: { exp: 50, temp_luck: 10 },\n    craftable: true,\n    recipe: { fish_rarity: 'COMMON', fish_count: 2 },\n  },\n};\n\n// ── ระดับเครื่องราง helpers ──────────────────────────────────\nconst CHARM_RARITY = {\n  COMMON:    { name: 'ธรรมดา',  emoji: () => require('./emojis').rarity_common,    color: 0x95A5A6 },\n  RARE:      { name: 'หายาก',   emoji: () => require('./emojis').rarity_rare,      color: 0x3498DB },\n  LEGENDARY: { name: 'ตำนาน',   emoji: () => require('./emojis').rarity_legendary, color: 0x9B59B6 },\n  ANCIENT:   { name: 'โบราณ',   emoji: () => require('./emojis').rarity_ancient,   color: 0x1A1A2E },\n};\n\n// ===== EXP Table เลเวล 1-100 =====\n// สูตรใหม่: exp = 300 + (level × 20)\nfunction calcExpForLevel(lv) {\n  if (lv <= 1) return 0;\n  return 300 + ((lv - 1) * 20);\n}\n\n// cumulative exp ถึงเลเวล lv\nfunction totalExpForLevel(lv) {\n  let total = 0;\n  for (let i = 2; i <= lv; i++) total += calcExpForLevel(i);\n  return total;\n}\n\nfunction calcLevel(totalExp) {\n  let lv = 1;\n  while (lv < 100 && totalExp >= totalExpForLevel(lv + 1)) lv++;\n  return lv;\n}\n\n// ===== Level Rewards =====\nconst LEVEL_REWARDS = {\n  1:  { roles: ['1489583564159713280'], pearl: 500,  echo: 0,     items: [] },\n  25: { roles: ['1489583688940257531'], pearl: 25000, echo: 4500,  items: [] },\n  50: { roles: ['1489584014414315591'], pearl: 100000,echo: 0,     items: [{ type: 'rod', id: 'thunder_rod' }] },\n  75: { roles: ['1489584583673516052'], pearl: 500000,echo: 0,     items: [{ type: 'charm', id: 'ocean_necklace' }] },\n  100:{ roles: ['1489585386698309693'], pearl: 0,     echo: 20000, items: [{ type: 'rod', id: 'abyss_rod' }] },\n};\n\nfunction getExpertiseTitle(level) {\n  if (level >= 100) return 'ปรมาจารย์เเห่งสายธาร';\n  if (level >= 75)  return 'ตกปลาขั้นเทพ';\n  if (level >= 50)  return 'ตกปลาที่ชำนาญ';\n  if (level >= 25)  return 'ผู้นักตกปลาฝึกหัด';\n  if (level >= 10)  return 'กำลังเรียนรู้';\n  return 'มือใหม่';\n}\n\nmodule.exports = {\n  RODS, BAITS, CHARMS, FOODS, CHARM_RARITY,\n  calcLevel, totalExpForLevel, calcExpForLevel,\n  getExpertiseTitle, LEVEL_REWARDS,\n};\n\n"};

// State
const fileContents = {};   // current edited content
const originalContents = {}; // original
const openTabs = [];       // ['index.js', ...]
let activeFile = null;
let lineNumEl = null;
let editorEl = null;

// Init: copy originals
for (const [k, v] of Object.entries(FILES_DATA)) {
  originalContents[k] = v;
  fileContents[k] = v;
}

// FILE TREE STRUCTURE
const treeStructure = {
  'root': ['index.js','database.js','package.json','README.md'],
  'handlers': ['handlers/admin.js','handlers/fishing.js','handlers/food.js','handlers/game.js',
               'handlers/index_fish.js','handlers/market.js','handlers/register.js','handlers/shop.js',
               'handlers/special_shop.js','handlers/updatelog.js'],
  'data': ['data/emojis.js','data/fish.js','data/items.js'],
};

function getFileIcon(name) {
  if (name.endsWith('.md')) return '📄';
  if (name.endsWith('.json')) return '{}';
  if (name.includes('fish')) return '🐟';
  if (name.includes('admin')) return '🔧';
  if (name.includes('shop')) return '🛒';
  if (name.includes('market')) return '💰';
  if (name.includes('emojis')) return '😀';
  if (name.includes('items')) return '🎣';
  if (name.includes('game')) return '🎮';
  if (name.includes('food')) return '🍱';
  if (name.includes('register')) return '📋';
  if (name.includes('database')) return '🗄️';
  if (name.includes('update')) return '📰';
  return '📝';
}

function buildTree(filter='') {
  const root = document.getElementById('tree-root');
  root.innerHTML = '';
  
  const sections = [
    { label: 'root', files: treeStructure.root },
    { label: 'handlers/', files: treeStructure.handlers },
    { label: 'data/', files: treeStructure.data },
  ];

  for (const sec of sections) {
    const filtered = sec.files.filter(f => {
      const short = f.split('/').pop();
      return !filter || short.toLowerCase().includes(filter.toLowerCase());
    });
    if (filtered.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'tree-section';
    if (sec.label !== 'root') {
      const lbl = document.createElement('div');
      lbl.className = 'tree-label';
      lbl.textContent = sec.label;
      section.appendChild(lbl);
    }

    for (const fpath of filtered) {
      const short = fpath.split('/').pop();
      const btn = document.createElement('button');
      btn.className = 'tree-file' + (activeFile===fpath?' active':'') + (isModified(fpath)?' modified':'');
      btn.dataset.path = fpath;
      btn.innerHTML = `<span class="file-icon">${getFileIcon(short)}</span><span class="fname">${short}</span>`;
      btn.onclick = () => openFile(fpath);
      section.appendChild(btn);
    }
    root.appendChild(section);
  }
}

function filterFiles(val) { buildTree(val); }

function isModified(path) {
  return fileContents[path] !== originalContents[path];
}

// ── TABS ──
function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  for (const fp of openTabs) {
    const short = fp.split('/').pop();
    const tab = document.createElement('button');
    tab.className = 'tab' + (fp===activeFile?' active':'');
    const dot = isModified(fp) ? '<span class="tab-dot">●</span>' : '';
    tab.innerHTML = `${dot}<span>${short}</span><span class="tab-close" data-path="${fp}">×</span>`;
    tab.onclick = (e) => {
      if (e.target.classList.contains('tab-close')) {
        closeTab(e.target.dataset.path);
      } else {
        switchToFile(fp);
      }
    };
    container.appendChild(tab);
  }
}

function closeTab(fp) {
  const idx = openTabs.indexOf(fp);
  openTabs.splice(idx, 1);
  if (activeFile === fp) {
    activeFile = openTabs[Math.min(idx, openTabs.length-1)] || null;
    if (activeFile) loadFileIntoEditor(activeFile);
    else showEmpty();
  }
  renderTabs();
  buildTree();
}

// ── EDITOR ──
function setupEditor() {
  const container = document.getElementById('editor-container');
  container.innerHTML = '';
  
  lineNumEl = document.createElement('div');
  lineNumEl.className = 'line-nums';
  lineNumEl.id = 'line-nums';
  
  editorEl = document.createElement('textarea');
  editorEl.id = 'editor';
  editorEl.spellcheck = false;
  editorEl.autocomplete = 'off';
  editorEl.autocorrect = 'off';
  editorEl.autocapitalize = 'off';
  
  container.appendChild(lineNumEl);
  container.appendChild(editorEl);
  
  editorEl.addEventListener('input', onEditorInput);
  editorEl.addEventListener('keydown', onKeyDown);
  editorEl.addEventListener('scroll', syncScroll);
  editorEl.addEventListener('click', updateStatus);
  editorEl.addEventListener('keyup', updateStatus);

  document.getElementById('statusbar').style.display = 'flex';
  document.getElementById('empty-state')?.remove();
}

function syncScroll() {
  if (lineNumEl && editorEl) {
    lineNumEl.scrollTop = editorEl.scrollTop;
  }
}

function updateLineNums(content) {
  if (!lineNumEl) return;
  const lines = content.split("\n").length;
  lineNumEl.innerHTML = Array.from({length: lines}, (_,i) => `<div>${i+1}</div>`).join('');
}

function onEditorInput() {
  if (!activeFile) return;
  fileContents[activeFile] = editorEl.value;
  updateLineNums(editorEl.value);
  updateStatus();
  renderTabs();
  buildTree();
  const lbl = document.getElementById('status-modified');
  lbl.textContent = isModified(activeFile) ? '✏️ แก้ไขแล้ว' : '✓ บันทึกแล้ว';
  lbl.className = isModified(activeFile) ? 'status-modified' : '';
}

function onKeyDown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editorEl.selectionStart;
    const end = editorEl.selectionEnd;
    editorEl.value = editorEl.value.substring(0,start) + '  ' + editorEl.value.substring(end);
    editorEl.selectionStart = editorEl.selectionEnd = start + 2;
    onEditorInput();
  }
}

function updateStatus() {
  if (!editorEl || !activeFile) return;
  const text = editorEl.value;
  const lines = text.split("\n").length;
  const pos = editorEl.selectionStart;
  const textBefore = text.substring(0, pos);
  const ln = textBefore.split("\n").length;
  const col = pos - textBefore.lastIndexOf("\n");
  document.getElementById('status-lines').textContent = lines + " lines";
  document.getElementById('status-cursor').textContent = `Ln ${ln}, Col ${col}`;
}

function showEmpty() {
  const container = document.getElementById('editor-container');
  container.innerHTML = '<div class="empty-state"><div class="big">🎣</div><p>เลือกไฟล์จาก sidebar</p></div>';
  document.getElementById('statusbar').style.display = 'none';
  lineNumEl = null; editorEl = null;
  document.getElementById('current-file-label').textContent = '— เลือกไฟล์เพื่อเริ่มแก้ไข';
}

function loadFileIntoEditor(fp) {
  if (!editorEl) setupEditor();
  editorEl.value = fileContents[fp];
  updateLineNums(fileContents[fp]);
  syncScroll();
  updateStatus();
  document.getElementById('status-filename').textContent = fp;
  document.getElementById('status-modified').textContent = isModified(fp) ? '✏️ แก้ไขแล้ว' : '✓ ไม่มีการแก้ไข';
  document.getElementById('current-file-label').textContent = '— ' + fp;
  editorEl.focus();
}

function openFile(fp) {
  if (!openTabs.includes(fp)) openTabs.push(fp);
  switchToFile(fp);
}

function switchToFile(fp) {
  // save current
  if (activeFile && editorEl) fileContents[activeFile] = editorEl.value;
  activeFile = fp;
  if (!editorEl) setupEditor();
  loadFileIntoEditor(fp);
  renderTabs();
  buildTree();
}

// ── DOWNLOAD ──
function downloadCurrent() {
  if (!activeFile) { showToast('⚠️ ยังไม่ได้เลือกไฟล์'); return; }
  const content = fileContents[activeFile];
  const short = activeFile.split('/').pop();
  downloadFile(short, content);
  showToast('⬇ Download: ' + short);
}

async function downloadAll() {
  // Use JSZip from CDN
  if (!window.JSZip) {
    showToast('⏳ กำลังโหลด JSZip...');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  const zip = new JSZip();
  for (const [path, content] of Object.entries(fileContents)) {
    zip.file(path, content);
  }
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fb7_edited.zip';
  a.click(); URL.revokeObjectURL(url);
  showToast('⬇ Download: fb7_edited.zip');
}

function downloadFile(name, content) {
  const blob = new Blob([content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function resetCurrentFile() {
  if (!activeFile) return;
  if (!confirm('Reset "' + activeFile + '" กลับเป็น code ต้นฉบับ?')) return;
  fileContents[activeFile] = originalContents[activeFile];
  if (editorEl) loadFileIntoEditor(activeFile);
  renderTabs();
  buildTree();
  showToast('↺ Reset: ' + activeFile.split("/").pop());
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
buildTree();
renderTabs();
</script>
