<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fb7 Code Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;--sidebar:#111118;--editor:#0a0a10;
  --border:#1e1e2e;--accent:#7c6fff;--accent2:#ff6b9d;
  --text:#cdd6f4;--muted:#585b70;--sub:#a6adc8;
  --green:#a6e3a1;--yellow:#f9e2af;--pink:#f38ba8;
  --blue:#89b4fa;--teal:#94e2d5;--orange:#fab387;
}
html,body{height:100%;overflow:hidden;font-family:"JetBrains Mono",monospace}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text)}

/* ── TOP BAR ── */
.topbar{
  height:48px;background:var(--sidebar);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
  justify-content:space-between;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-family:"Syne",sans-serif;font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-0.5px}
.version{font-size:11px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:4px}
.topbar-right{display:flex;gap:8px}
.btn{
  padding:6px 14px;border-radius:6px;font-family:"JetBrains Mono",monospace;
  font-size:12px;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;
  transition:all 0.15s;
}
.btn-dl{background:var(--accent);color:#fff}
.btn-dl:hover{background:#6a5ff0}
.btn-dl-all{background:transparent;border:1px solid var(--border);color:var(--sub)}
.btn-dl-all:hover{border-color:var(--accent);color:var(--accent)}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-reset:hover{border-color:var(--pink);color:var(--pink)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── FILE TREE ── */
.filetree{
  width:220px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border);overflow-y:auto;
  display:flex;flex-direction:column;
}
.tree-header{
  padding:12px 16px;font-size:10px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);
  font-family:"Syne",sans-serif;
}
.tree-section{padding:8px 0}
.tree-label{
  padding:4px 16px;font-size:10px;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;
}
.tree-file{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;font-size:12px;cursor:pointer;
  color:var(--sub);transition:all 0.1s;position:relative;
  border:none;background:none;width:100%;text-align:left;
}
.tree-file:hover{background:var(--border)88;color:var(--text)}
.tree-file.active{background:var(--accent)18;color:var(--accent)}
.tree-file.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;background:var(--accent);
}
.tree-file.modified .fname::after{
  content:'●';color:var(--yellow);margin-left:4px;font-size:9px;
}
.file-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0}

/* ── EDITOR AREA ── */
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TABS */
.tabs{
  height:38px;background:var(--sidebar);border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;overflow-x:auto;flex-shrink:0;
}
.tabs::-webkit-scrollbar{height:3px}
.tabs::-webkit-scrollbar-thumb{background:var(--border)}
.tab{
  padding:8px 16px;font-size:12px;cursor:pointer;
  color:var(--muted);border-right:1px solid var(--border);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  border:none;background:none;transition:all 0.1s;flex-shrink:0;
}
.tab:hover{color:var(--sub)}
.tab.active{background:var(--editor);color:var(--text);border-bottom:2px solid var(--accent)}
.tab .tab-close{
  opacity:0;font-size:14px;color:var(--muted);
  border:none;background:none;cursor:pointer;padding:0 2px;line-height:1;
}
.tab:hover .tab-close{opacity:1}
.tab .tab-dot{font-size:8px;color:var(--yellow)}

/* EDITOR */
.editor-container{flex:1;position:relative;overflow:hidden;display:flex}
.line-nums{
  width:52px;flex-shrink:0;background:var(--editor);
  padding:16px 8px;text-align:right;font-size:13px;
  line-height:1.6;color:var(--muted);overflow:hidden;
  user-select:none;border-right:1px solid var(--border);
}
textarea#editor{
  flex:1;background:var(--editor);color:var(--text);
  border:none;outline:none;resize:none;
  padding:16px;font-family:"JetBrains Mono",monospace;
  font-size:13px;line-height:1.6;tab-size:2;
  white-space:pre;overflow-wrap:normal;overflow-x:auto;
  caret-color:var(--accent);
}
textarea#editor::selection{background:var(--accent)33}

/* STATUS BAR */
.statusbar{
  height:28px;background:var(--accent);display:flex;align-items:center;
  padding:0 16px;gap:16px;font-size:11px;color:rgba(255,255,255,0.85);
  flex-shrink:0;
}
.statusbar .sep{opacity:0.4}
.status-modified{color:#fff;font-weight:600}

/* EMPTY STATE */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--muted);
}
.empty-state .big{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:13px}

/* TOAST */
.toast{
  position:fixed;bottom:40px;right:24px;
  background:var(--green);color:#1e1e2e;
  padding:10px 18px;border-radius:8px;font-size:13px;
  font-weight:600;opacity:0;pointer-events:none;
  transition:all 0.3s;transform:translateY(8px);z-index:999;
}
.toast.show{opacity:1;transform:translateY(0)}

/* SEARCH BAR */
.search-wrap{
  padding:8px 12px;border-bottom:1px solid var(--border);
}
.search-input{
  width:100%;background:var(--border);border:1px solid transparent;
  border-radius:6px;padding:6px 10px;font-family:"JetBrains Mono",monospace;
  font-size:11px;color:var(--text);outline:none;
}
.search-input:focus{border-color:var(--accent)66}
.search-input::placeholder{color:var(--muted)}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">fb7</span>
    <span class="version">v1.8.2</span>
    <span style="font-size:12px;color:var(--muted)" id="current-file-label">— เลือกไฟล์เพื่อเริ่มแก้ไข</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-reset" onclick="resetCurrentFile()" title="Reset ไฟล์ปัจจุบัน">↺ Reset</button>
    <button class="btn btn-dl-all" onclick="downloadAll()">⬇ Download ทั้งหมด (.zip)</button>
    <button class="btn btn-dl" onclick="downloadCurrent()">⬇ Download ไฟล์นี้</button>
  </div>
</div>

<div class="layout">
  <!-- FILE TREE -->
  <div class="filetree">
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="🔍 ค้นหาไฟล์..." oninput="filterFiles(this.value)" id="search-input">
    </div>
    <div id="tree-root"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-wrap" id="editor-wrap">
    <div class="tabs" id="tabs"></div>
    <div class="editor-container" id="editor-container">
      <div class="empty-state" id="empty-state">
        <div class="big">🎣</div>
        <p>เลือกไฟล์จาก sidebar เพื่อเปิดแก้ไข</p>
      </div>
    </div>
    <div class="statusbar" id="statusbar" style="display:none">
      <span id="status-filename"></span>
      <span class="sep">|</span>
      <span id="status-lines">0 lines</span>
      <span class="sep">|</span>
      <span id="status-cursor">Ln 1, Col 1</span>
      <span class="sep">|</span>
      <span id="status-modified"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FILES_DATA = {"index.js": "const {\n  Client, GatewayIntentBits, Partials,\n  EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle,\n  REST, Routes, SlashCommandBuilder,\n} = require('discord.js');\nrequire('dotenv').config();\n\nconst db = require('./database');\nconst { handleRegister, handleProfile } = require('./handlers/register');\nconst { handleMainMenu, handleLocation, handleBag, handleHowToPlay } = require('./handlers/game');\nconst { handleLocationView, handleFishStart, handleFishPull } = require('./handlers/fishing');\nconst { handleShopMenu, handleShop } = require('./handlers/shop');\nconst { handleFishIndex, handleFishIndexPage } = require('./handlers/index_fish');\nconst { handleFood } = require('./handlers/food');\nconst {\n  handleSellCommand, handleMarketSelect, handleMarketItemSelect,\n  handleMarketModalSubmit, handleMarketBuy,\n} = require('./handlers/market');\nconst {\n  handleAddPearl, handleRemovePearl, handleBanAccount, handleViewAccount,\n  handleAddItem,\n  handleAddItemCategory, handleAddItemSelect, handleAddItemConfirm, handleAddItemCancel,\n} = require('./handlers/admin');\nconst { sendUpdateLog } = require('./handlers/updatelog');\nconst {\n  handleSetSpecialShop, handleSpecialShop,\n  handleSpecialShopModal, handleSpecialShopSelect,\n} = require('./handlers/special_shop');\n\nconst client = new Client({\n  intents: [\n    GatewayIntentBits.Guilds, GatewayIntentBits.GuildMessages,\n    GatewayIntentBits.MessageContent, GatewayIntentBits.GuildMembers,\n  ],\n  partials: [Partials.Channel, Partials.Message],\n});\n\nconst REGISTER_CHANNEL = '1489522462587879554';\nconst GAME_CHANNEL     = '1489522699943284766';\n\n// ── Slash Commands ────────────────────────────────────────────\nconst commands = [\n  new SlashCommandBuilder().setName('ขายของ').setDescription('ลงขายของในตลาด').toJSON(),\n  new SlashCommandBuilder().setName('เพิ่มpearl').setDescription('[Admin] เพิ่ม Pearl ให้ผู้เล่น')\n    .addUserOption(o => o.setName('ผู้เล่น').setDescription('เลือกผู้เล่น').setRequired(true))\n    .addIntegerOption(o => o.setName('จำนวน').setDescription('จำนวน Pearl').setRequired(true)).toJSON(),\n  new SlashCommandBuilder().setName('ลบpearl').setDescription('[Admin] ลบ Pearl จากผู้เล่น')\n    .addUserOption(o => o.setName('ผู้เล่น').setDescription('เลือกผู้เล่น').setRequired(true))\n    .addIntegerOption(o => o.setName('จำนวน').setDescription('จำนวน Pearl').setRequired(true)).toJSON(),\n  new SlashCommandBuilder().setName('แบนบัญชี').setDescription('[Admin] แบน/ยกเลิกแบนบัญชี')\n    .addUserOption(o => o.setName('ผู้เล่น').setDescription('เลือกผู้เล่น').setRequired(true)).toJSON(),\n  new SlashCommandBuilder().setName('ดูบัญชี').setDescription('[Admin] ดูรายละเอียดบัญชีผู้เล่น')\n    .addUserOption(o => o.setName('ผู้เล่น').setDescription('เลือกผู้เล่น').setRequired(true)).toJSON(),\n  // Admin: ร้านค้าพิเศษ (permission Administrator)\n  new SlashCommandBuilder().setName('เซ็ตขายของร้านค้าพิเศษ').setDescription('[Admin] ตั้งค่าร้านค้าพิเศษ').toJSON(),\n  // Owner only (1131982129039954091): แอดของ\n  new SlashCommandBuilder().setName('แอดของ').setDescription('[Owner] แอดไอเทมให้ผู้เล่น')\n    .addUserOption(o => o.setName('ผู้เล่น').setDescription('เลือกผู้เล่นที่จะแอดของให้').setRequired(true)).toJSON(),\n];\n\nclient.once('ready', async () => {\n  console.log(`✅ บอทตกปลาออนไลน์: ${client.user.tag}`);\n  await db.initDatabase();\n  await sendRegisterEmbed();\n  await sendGameEmbed();\n  await sendUpdateLog(client);\n\n  // Register slash commands\n  const rest = new REST({ version: '10' }).setToken(process.env.TOKEN);\n  try {\n    const guilds = client.guilds.cache;\n    for (const [, guild] of guilds) {\n      await rest.put(Routes.applicationGuildCommands(client.user.id, guild.id), { body: commands });\n    }\n    console.log('✅ Slash commands registered');\n  } catch (e) { console.error('Slash cmd error:', e); }\n});\n\nasync function sendRegisterEmbed() {\n  const channel = await client.channels.fetch(REGISTER_CHANNEL).catch(() => null);\n  if (!channel) return;\n  const messages = await channel.messages.fetch({ limit: 20 });\n  if (messages.find(m => m.author.id === client.user.id && m.embeds.length > 0)) return;\n\n  const embed = new EmbedBuilder()\n    .setTitle('🎣 ระบบตกปลา ผจญภัยในโลกกว้าง')\n    .setDescription(\n      '> **ระบบมินิเกมตกปลา สะสมปลาให้ครบคอลเล็กชั่น!**\\n\\n' +\n      '🐟 **ปลา 45 ตัว** แบ่งตามระดับความหายาก:\\n' +\n      '> ⚫ **โบราณ** (1%) | 🟣 **ตำนาน** (9%) | 🔵 **หายาก** (40%) | ⚪ **ธรรมดา** (50%)\\n\\n' +\n      '⚖️ **ระบบน้ำหนักปลา** — ปลายิ่งหนัก ยิ่งจับยาก ยิ่งแพง!\\n' +\n      '🔘 **Pearl** — สกุลเงินสำหรับซื้อของในระบบตกปลา\\n\\n' +\n      '📍 เมื่อลงทะเบียนแล้ว เล่นได้ที่ <#1489522699943284766>'\n    )\n    .setImage('https://cdn.discordapp.com/attachments/1312761069646909472/1489516780371054612/file_00000000565c71fabf97dca529ed31a7.png?ex=69d0b41a&is=69cf629a&hm=e8e3d1de7ab31018a4b8ca609b4bb90ad9a3ed6bc032a316971ec295c794b1c7&')\n    .setColor(0x00BFFF)\n    .setFooter({ text: 'Sori Adventure • ระบบตกปลา' });\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('fishing_register').setLabel('⚓ เข้าร่วมการผจญภัย').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('fishing_profile').setLabel('📊 ดูข้อมูลของตัวเอง').setStyle(ButtonStyle.Secondary),\n  );\n  await channel.send({ embeds: [embed], components: [row] });\n}\n\nasync function sendGameEmbed() {\n  const channel = await client.channels.fetch(GAME_CHANNEL).catch(() => null);\n  if (!channel) return;\n  const messages = await channel.messages.fetch({ limit: 20 });\n  if (messages.find(m => m.author.id === client.user.id && m.embeds.length > 0)) return;\n\n  const embed = new EmbedBuilder()\n    .setTitle('🌍 การผจญภัยได้เริ่มขึ้นแล้ว!')\n    .setDescription(\n      '> *\"ตามหาสมบัติที่ฉันซ่อนเอาไว้ซิ ที่นั่นน่ะ...\"*\\n> — **ลูกดิส Sori**\\n\\n' +\n      '🎣 ยินดีต้อนรับสู่โลกแห่งการตกปลา!'\n    )\n    .setImage('https://cdn.discordapp.com/attachments/1312761069646909472/1489523787710861312/cacc6fdf5d1ab41f6b40a5a4599288c0.gif?ex=69d0baa1&is=69cf6921&hm=f32ab16b4cd7d6879a851de03194179b8e9bb7f1838b742dd63fb1ece5cd6c820f&')\n    .setColor(0x2ECC71)\n    .setFooter({ text: 'Sori พาผจญภัย • กดเริ่มเล่นได้เลย!' });\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('fishing_start').setLabel('เริ่มเล่น').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('fish_index').setLabel('สมุดบันทึกปลา').setEmoji({ id: '1490021446091538624', name: 'indexFish1' }).setStyle(ButtonStyle.Secondary),\n  );\n  await channel.send({ embeds: [embed], components: [row] });\n}\n\n// ── Interaction Router ────────────────────────────────────────\nclient.on('interactionCreate', async (interaction) => {\n  try {\n    // ── Slash Commands ──\n    if (interaction.isChatInputCommand()) {\n      const cmd = interaction.commandName;\n      if (cmd === 'ขายของ')                         return handleSellCommand(interaction);\n      if (cmd === 'เพิ่มpearl')                     return handleAddPearl(interaction);\n      if (cmd === 'ลบpearl')                        return handleRemovePearl(interaction);\n      if (cmd === 'แบนบัญชี')                       return handleBanAccount(interaction);\n      if (cmd === 'ดูบัญชี')                        return handleViewAccount(interaction);\n      if (cmd === 'เซ็ตขายของร้านค้าพิเศษ')         return handleSetSpecialShop(interaction);\n      if (cmd === 'แอดของ')                          return handleAddItem(interaction);\n      return;\n    }\n\n    // ── Modal Submit ──\n    if (interaction.isModalSubmit()) {\n      if (interaction.customId.startsWith('mkt_modal_'))   return handleMarketModalSubmit(interaction);\n      if (interaction.customId.startsWith('sshop_modal__'))return handleSpecialShopModal(interaction);\n      return;\n    }\n\n    // ── String Select Menu ──\n    if (interaction.isStringSelectMenu()) {\n      if (interaction.customId === 'sshop_item_select') return handleSpecialShopSelect(interaction);\n      if (interaction.customId === 'additem_select')    return handleAddItemSelect(interaction);\n      return;\n    }\n\n    // ── Buttons ──\n    if (!interaction.isButton()) return;\n    const id = interaction.customId;\n\n    if (id === 'fishing_register')    return handleRegister(interaction);\n    if (id === 'fishing_profile')     return handleProfile(interaction);\n    if (id === 'fishing_start')       return handleMainMenu(interaction);\n    if (id === 'menu_shop')           return handleShopMenu(interaction);\n    if (id === 'menu_location')       return handleLocation(interaction);\n    if (id === 'menu_bag')            return handleBag(interaction);\n    if (id === 'menu_howtoplay')      return handleHowToPlay(interaction);\n    if (id === 'menu_contact')        return handleContact(interaction);\n    if (id === 'fish_index')          return handleFishIndex(interaction);\n    if (id.startsWith('fishidx_'))    return handleFishIndexPage(interaction);\n    if (id.startsWith('shop_'))       return handleShop(interaction);\n    if (id === 'menu_shop')           return handleShopMenu(interaction);\n    if (id.startsWith('food_'))       return handleFood(interaction);\n    if (id.startsWith('loc_'))        return handleLocationView(interaction);\n    if (id.startsWith('fish_start_')) return handleFishStart(interaction);\n    if (id.startsWith('fish_pull_'))  return handleFishPull(interaction);\n    if (id.startsWith('mkt_select_')) return handleMarketSelect(interaction);\n    if (id.startsWith('mkt_item_'))   return handleMarketItemSelect(interaction);\n    if (id.startsWith('mkt_buy_'))    return handleMarketBuy(interaction);\n    if (id.startsWith('sshop_'))          return handleSpecialShop(interaction);\n    if (id.startsWith('additem_cat_'))    return handleAddItemCategory(interaction);\n    if (id.startsWith('additem_confirm_'))return handleAddItemConfirm(interaction);\n    if (id === 'additem_cancel')          return handleAddItemCancel(interaction);\n\n  } catch (err) {\n    console.error('Interaction error:', err);\n    const msg = { content: '❌ เกิดข้อผิดพลาด กรุณาลองใหม่', ephemeral: true };\n    if (interaction.replied || interaction.deferred) await interaction.followUp(msg).catch(() => {});\n    else await interaction.reply(msg).catch(() => {});\n  }\n});\n\nasync function handleContact(interaction) {\n  await interaction.reply({\n    embeds: [new EmbedBuilder().setTitle('📬 ติดต่อผู้สร้าง').setDescription('หากพบบั๊ก:\\n\\n👤 **@minluvcat_**').setColor(0xF39C12)],\n    ephemeral: true,\n  });\n}\n\nclient.login(process.env.TOKEN);\n", "database.js": "const mysql = require('mysql2/promise');\nrequire('dotenv').config();\n\nlet pool;\n\nasync function initDatabase() {\n  pool = mysql.createPool({\n    host: process.env.DB_HOST, user: process.env.DB_USER,\n    password: process.env.DB_PASS, database: process.env.DB_NAME,\n    waitForConnections: true, connectionLimit: 10,\n  });\n\n  await pool.execute(`\n    CREATE TABLE IF NOT EXISTS fishing_players (\n      user_id VARCHAR(30) PRIMARY KEY, username VARCHAR(100),\n      level INT DEFAULT 1, exp BIGINT DEFAULT 0, pearl BIGINT DEFAULT 0,\n      total_pearl_earned BIGINT DEFAULT 0, total_fish_caught INT DEFAULT 0,\n      rod VARCHAR(50) DEFAULT 'bamboo_rod', active_charm VARCHAR(50) DEFAULT NULL,\n      active_food VARCHAR(50) DEFAULT NULL, temp_luck INT DEFAULT 0,\n      expertise VARCHAR(50) DEFAULT 'มือใหม่', player_stamina INT DEFAULT 100,\n      is_banned TINYINT DEFAULT 0,\n      registered_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n    )\n  `);\n\n  await pool.execute(`\n    CREATE TABLE IF NOT EXISTS fishing_inventory (\n      id INT AUTO_INCREMENT PRIMARY KEY, user_id VARCHAR(30),\n      item_type ENUM('rod','bait','charm','food','fish'),\n      item_id VARCHAR(50), quantity INT DEFAULT 1,\n      weight DECIMAL(8,2) DEFAULT NULL,\n      UNIQUE KEY uniq_item (user_id, item_type, item_id)\n    )\n  `);\n\n  await pool.execute(`\n    CREATE TABLE IF NOT EXISTS fishing_collection (\n      user_id VARCHAR(30), fish_id VARCHAR(50),\n      count INT DEFAULT 0, fish_escaped INT DEFAULT 0,\n      first_caught TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n      PRIMARY KEY (user_id, fish_id)\n    )\n  `);\n\n  const alters = [\n    `ALTER TABLE fishing_players ADD COLUMN IF NOT EXISTS active_charm VARCHAR(50) DEFAULT NULL`,\n    `ALTER TABLE fishing_players ADD COLUMN IF NOT EXISTS active_food VARCHAR(50) DEFAULT NULL`,\n    `ALTER TABLE fishing_players ADD COLUMN IF NOT EXISTS temp_luck INT DEFAULT 0`,\n    `ALTER TABLE fishing_players ADD COLUMN IF NOT EXISTS player_stamina INT DEFAULT 100`,\n    `ALTER TABLE fishing_players ADD COLUMN IF NOT EXISTS is_banned TINYINT DEFAULT 0`,\n    `ALTER TABLE fishing_inventory ADD COLUMN IF NOT EXISTS weight DECIMAL(8,2) DEFAULT NULL`,\n    `ALTER TABLE fishing_collection ADD COLUMN IF NOT EXISTS fish_escaped INT DEFAULT 0`,\n  ];\n  for (const sql of alters) await pool.execute(sql).catch(() => {});\n  console.log('✅ Database ready');\n}\n\nasync function getPlayer(userId) {\n  const [r] = await pool.execute('SELECT * FROM fishing_players WHERE user_id = ?', [userId]);\n  return r[0] || null;\n}\n\nasync function createPlayer(userId, username) {\n  await pool.execute(\n    'INSERT INTO fishing_players (user_id, username, pearl, player_stamina) VALUES (?, ?, 500, 100)',\n    [userId, username]\n  );\n  await pool.execute(\n    'INSERT INTO fishing_inventory (user_id, item_type, item_id, quantity) VALUES (?, ?, ?, ?) ON DUPLICATE KEY UPDATE quantity = quantity + 1',\n    [userId, 'rod', 'bamboo_rod', 1]\n  );\n  return getPlayer(userId);\n}\n\nasync function updatePlayer(userId, fields) {\n  const entries = Object.entries(fields);\n  if (!entries.length) return;\n  const set = entries.map(([k]) => `${k} = ?`).join(', ');\n  await pool.execute(`UPDATE fishing_players SET ${set} WHERE user_id = ?`, [...entries.map(([,v]) => v), userId]);\n}\n\nasync function getInventory(userId) {\n  const [r] = await pool.execute('SELECT * FROM fishing_inventory WHERE user_id = ?', [userId]);\n  return r;\n}\n\nasync function getCollection(userId) {\n  const [r] = await pool.execute('SELECT * FROM fishing_collection WHERE user_id = ?', [userId]);\n  return r;\n}\n\nasync function addToCollection(userId, fishId) {\n  await pool.execute(\n    'INSERT INTO fishing_collection (user_id, fish_id, count) VALUES (?, ?, 1) ON DUPLICATE KEY UPDATE count = count + 1',\n    [userId, fishId]\n  );\n}\n\nasync function markEscaped(userId, fishId) {\n  await pool.execute(\n    'INSERT INTO fishing_collection (user_id, fish_id, count, fish_escaped) VALUES (?, ?, 0, 1) ON DUPLICATE KEY UPDATE fish_escaped = fish_escaped + 1',\n    [userId, fishId]\n  );\n}\n\n// เพิ่มปลาพร้อมน้ำหนัก (ใช้ separate row สำหรับปลาแต่ละตัวที่มีน้ำหนักต่างกัน)\nasync function addFishToInventory(userId, fishId, weight) {\n  // ปลาแต่ละตัวเก็บเป็น row ใหม่เสมอ เพราะน้ำหนักไม่เหมือนกัน\n  await pool.execute(\n    'INSERT INTO fishing_inventory (user_id, item_type, item_id, quantity, weight) VALUES (?, ?, ?, 1, ?)',\n    [userId, 'fish', fishId, weight]\n  );\n}\n\nasync function addToInventory(userId, itemType, itemId, qty = 1) {\n  await pool.execute(\n    'INSERT INTO fishing_inventory (user_id, item_type, item_id, quantity) VALUES (?, ?, ?, ?) ON DUPLICATE KEY UPDATE quantity = quantity + ?',\n    [userId, itemType, itemId, qty, qty]\n  );\n}\n\nasync function removeFromInventory(userId, itemType, itemId, qty = 1) {\n  await pool.execute(\n    'UPDATE fishing_inventory SET quantity = GREATEST(0, quantity - ?) WHERE user_id = ? AND item_type = ? AND item_id = ? AND (weight IS NULL OR weight = 0) LIMIT 1',\n    [qty, userId, itemType, itemId]\n  );\n  await pool.execute(\n    'DELETE FROM fishing_inventory WHERE user_id = ? AND item_type = ? AND item_id = ? AND quantity = 0',\n    [userId, itemType, itemId]\n  );\n}\n\nasync function removeFishById(userId, inventoryId) {\n  await pool.execute('DELETE FROM fishing_inventory WHERE id = ? AND user_id = ?', [inventoryId, userId]);\n}\n\nasync function getInventoryItem(userId, itemType, itemId) {\n  const [r] = await pool.execute(\n    'SELECT * FROM fishing_inventory WHERE user_id = ? AND item_type = ? AND item_id = ? LIMIT 1',\n    [userId, itemType, itemId]\n  );\n  return r[0] || null;\n}\n\nasync function getAllPlayers() {\n  const [r] = await pool.execute('SELECT * FROM fishing_players ORDER BY level DESC, exp DESC');\n  return r;\n}\n\nmodule.exports = {\n  initDatabase, getPlayer, createPlayer, updatePlayer,\n  getInventory, getCollection, addToCollection, markEscaped,\n  addFishToInventory, addToInventory, removeFromInventory,\n  removeFishById, getInventoryItem, getAllPlayers,\n};\n", "package.json": "{\n  \"name\": \"sori-fishing-bot\",\n  \"version\": \"1.0.0\",\n  \"description\": \"Sori Adventure - Fishing Mini Game Bot\",\n  \"main\": \"index.js\",\n  \"scripts\": {\n    \"start\": \"node index.js\",\n    \"dev\": \"nodemon index.js\"\n  },\n  \"dependencies\": {\n    \"discord.js\": \"^14.14.1\",\n    \"mysql2\": \"^3.9.1\",\n    \"dotenv\": \"^16.4.1\"\n  },\n  \"devDependencies\": {\n    \"nodemon\": \"^3.1.0\"\n  }\n}\n", "README.md": "# 🎣 Sori Fishing Bot — ระบบตกปลาผจญภัย\n\n## โครงสร้างไฟล์\n```\nfishing-bot/\n├── index.js              # ไฟล์หลัก, login, embed ห้องต่างๆ\n├── database.js           # MySQL helper functions\n├── .env                  # Token + DB credentials\n├── package.json\n├── data/\n│   ├── fish.js           # ปลา 45 ตัว, สถานที่ 3 แห่ง, ระบบ roll\n│   └── items.js          # คันเบ็ด, เหยื่อ, เครื่องราง, อาหาร, EXP\n└── handlers/\n    ├── register.js       # ลงทะเบียน + ดูโปรไฟล์\n    ├── game.js           # เมนูหลัก, เลือกสถานที่, กระเป๋า, วิธีเล่น\n    ├── fishing.js        # ระบบตกปลา + คำนวณรางวัล\n    └── shop.js           # ร้านค้าทั้ง 5 ประเภท\n```\n\n## ห้อง Discord\n| ห้อง | ID | หน้าที่ |\n|------|-----|---------|\n| ลงทะเบียน | 1489522462587879554 | Embed + ปุ่มลงทะเบียน/ดูโปรไฟล์ |\n| เล่นเกม | 1489522699943284766 | Embed + ปุ่มเมนูหลักทั้งหมด |\n\n## ปลาทั้งหมด 45 ตัว\n| ระดับ | จำนวน | Drop Rate | ราคา Pearl |\n|-------|--------|-----------|------------|\n| ⚫ โบราณ | 5 | 2% | 3800-5000 |\n| 🟣 ตำนาน | 10 | 5% | 1500-2200 |\n| 🔵 หายาก | 15 | 18% | 400-700 |\n| ⚪ ธรรมดา | 15 | 75% | 20-90 |\n\n## สถานที่ตกปลา\n1. 🌲 **ลำธารในป่าลึก** — มือใหม่ ปลาธรรมดา-หายาก\n2. 🌿 **แม่น้ำในป่าอเมซอล** — กลาง ปลาหายาก-ตำนาน\n3. 👻 **สายธารวิญญาณ** — ยาก ปลาตำนาน-โบราณ\n\n## สกุลเงิน\n- **Pearl 💎** — ใช้ซื้อของในร้านค้าทั้งหมด\n- **EXP ✨** — สะสมขึ้นเลเวล 1-10\n\n## Install\n```bash\nnpm install\nnode index.js\n```\n\n## Database Tables\n- `fishing_players` — ข้อมูลผู้เล่น\n- `fishing_inventory` — ของในกระเป๋า\n- `fishing_collection` — ปลาที่สะสม\n", "handlers/admin.js": "// admin.js — คำสั่ง admin และ owner\n// Admin: /เพิ่มpearl /ลบpearl /แบนบัญชี\n// Owner (@minluvcat_ id): /ดูบัญชี\nconst { EmbedBuilder } = require('discord.js');\nconst db = require('../database');\n\nconst OWNER_ID = '1131982129039954091'; // ← ใส่ Discord User ID ของ @minluvcat_ ที่นี่\n\n// ── /เพิ่มpearl ─────────────────────────────────────────────\nasync function handleAddPearl(interaction) {\n  if (!isAdmin(interaction)) return interaction.reply({ content: '❌ ไม่มีสิทธิ์ใช้คำสั่งนี้นะ!', ephemeral: true });\n\n  const target = interaction.options.getUser('ผู้เล่น');\n  const amount = interaction.options.getInteger('จำนวน');\n  if (!target || !amount || amount <= 0)\n    return interaction.reply({ content: '❌ ข้อมูลไม่ถูกต้อง', ephemeral: true });\n\n  const player = await db.getPlayer(target.id);\n  if (!player) return interaction.reply({ content: `❌ **${target.username}** ยังไม่ได้ลงทะเบียน`, ephemeral: true });\n\n  await db.updatePlayer(target.id, { pearl: (player.pearl || 0) + amount });\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ เพิ่ม Pearl สำเร็จ')\n      .setDescription(`<@${target.id}> ได้รับ 🔘 **+${amount.toLocaleString()} Pearl**\\nPearl รวม: **${((player.pearl||0)+amount).toLocaleString()}**`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ── /ลบpearl ────────────────────────────────────────────────\nasync function handleRemovePearl(interaction) {\n  if (!isAdmin(interaction)) return interaction.reply({ content: '❌ ไม่มีสิทธิ์!', ephemeral: true });\n\n  const target = interaction.options.getUser('ผู้เล่น');\n  const amount = interaction.options.getInteger('จำนวน');\n  if (!target || !amount || amount <= 0) return interaction.reply({ content: '❌ ข้อมูลไม่ถูกต้อง', ephemeral: true });\n\n  const player = await db.getPlayer(target.id);\n  if (!player) return interaction.reply({ content: `❌ **${target.username}** ยังไม่ได้ลงทะเบียน`, ephemeral: true });\n\n  const newPearl = Math.max(0, (player.pearl || 0) - amount);\n  await db.updatePlayer(target.id, { pearl: newPearl });\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ ลบ Pearl สำเร็จ')\n      .setDescription(`<@${target.id}> ถูกลบ 🔘 **${amount.toLocaleString()} Pearl**\\nPearl คงเหลือ: **${newPearl.toLocaleString()}**`)\n      .setColor(0xE74C3C)],\n    ephemeral: true,\n  });\n}\n\n// ── /แบนบัญชี ───────────────────────────────────────────────\nasync function handleBanAccount(interaction) {\n  if (!isAdmin(interaction)) return interaction.reply({ content: '❌ ไม่มีสิทธิ์!', ephemeral: true });\n\n  const target = interaction.options.getUser('ผู้เล่น');\n  if (!target) return interaction.reply({ content: '❌ ระบุผู้เล่นไม่ถูกต้อง', ephemeral: true });\n\n  const player = await db.getPlayer(target.id);\n  if (!player) return interaction.reply({ content: `❌ **${target.username}** ยังไม่ได้ลงทะเบียน`, ephemeral: true });\n\n  const newBan = player.is_banned ? 0 : 1;\n  await db.updatePlayer(target.id, { is_banned: newBan });\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle(newBan ? '🚫 แบนบัญชีแล้ว' : '✅ ยกเลิกแบนแล้ว')\n      .setDescription(`<@${target.id}> (${target.username}): ${newBan ? '**ถูกแบน**' : '**ยกเลิกแบนแล้ว**'}`)\n      .setColor(newBan ? 0xE74C3C : 0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ── /ดูบัญชี (owner only) ───────────────────────────────────\nasync function handleViewAccount(interaction) {\n  if (interaction.user.id !== OWNER_ID && !isAdmin(interaction))\n    return interaction.reply({ content: '❌ ไม่มีสิทธิ์!', ephemeral: true });\n\n  const target = interaction.options.getUser('ผู้เล่น');\n  if (!target) return interaction.reply({ content: '❌ ระบุผู้เล่นไม่ถูกต้อง', ephemeral: true });\n\n  const player = await db.getPlayer(target.id);\n  if (!player) return interaction.reply({ content: `❌ **${target.username}** ยังไม่ได้ลงทะเบียน`, ephemeral: true });\n\n  const inventory  = await db.getInventory(target.id);\n  const collection = await db.getCollection(target.id);\n  const { getExpertiseTitle, totalExpForLevel } = require('../data/items');\n  const expNext = totalExpForLevel((player.level||1) + 1);\n\n  const embed = new EmbedBuilder()\n    .setTitle(`🔍 ข้อมูลบัญชี: ${target.username}`)\n    .setThumbnail(target.displayAvatarURL())\n    .addFields(\n      { name: '👤 User ID',        value: target.id,                                      inline: true },\n      { name: '⭐ เลเวล',          value: `Lv.${player.level}`,                           inline: true },\n      { name: '📊 EXP',            value: `${(player.exp||0).toLocaleString()} / ${expNext.toLocaleString()}`, inline: true },\n      { name: '🔘 Pearl',          value: `${(player.pearl||0).toLocaleString()}`,         inline: true },\n      { name: '📈 Pearl สะสม',     value: `${(player.total_pearl_earned||0).toLocaleString()}`, inline: true },\n      { name: '🐟 ตกปลาทั้งหมด',  value: `${player.total_fish_caught} ตัว`,              inline: true },\n      { name: '🎣 คันเบ็ด',        value: player.rod,                                     inline: true },\n      { name: '📚 คอลเล็กชั่น',   value: `${collection.filter(c=>c.count>0).length}/45`, inline: true },\n      { name: '🏅 ความชำนาญ',      value: getExpertiseTitle(player.level),                inline: true },\n      { name: '❤️ Stamina',        value: `${player.player_stamina ?? 100}/100`,           inline: true },\n      { name: '🚫 แบน',            value: player.is_banned ? 'ใช่' : 'ไม่',               inline: true },\n      { name: '📦 ไอเทมในกระเป๋า', value: `${inventory.length} ชิ้น`,                    inline: true },\n      { name: '📅 ลงทะเบียนเมื่อ', value: new Date(player.registered_at).toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' }), inline: false },\n    )\n    .setColor(0x3498DB);\n\n  await interaction.reply({ embeds: [embed], ephemeral: true });\n}\n\nfunction isAdmin(interaction) {\n  return interaction.member?.permissions?.has('Administrator') || false;\n}\n\n// ── /แอดของ (owner only: 1131982129039954091) ────────────────\n// ขั้นตอน: @user → เลือกหมวด → เลือกไอเทม → ยืนยัน → แอดเข้า inventory\nconst addItemSessions = new Map(); // userId → { targetId, step }\n\nasync function handleAddItem(interaction) {\n  if (interaction.user.id !== OWNER_ID)\n    return interaction.reply({ content: '❌ คำสั่งนี้ใช้ได้เฉพาะเจ้าของบอทเท่านั้น!', ephemeral: true });\n\n  const target = interaction.options.getUser('ผู้เล่น');\n  if (!target) return interaction.reply({ content: '❌ ระบุผู้เล่นไม่ถูกต้อง', ephemeral: true });\n\n  const player = await db.getPlayer(target.id);\n  if (!player) return interaction.reply({ content: `❌ **${target.username}** ยังไม่ได้ลงทะเบียน`, ephemeral: true });\n\n  // เก็บ session\n  addItemSessions.set(interaction.user.id, { targetId: target.id, targetName: target.username });\n\n  const { RODS, BAITS, CHARMS, FOODS, CHARM_RARITY } = require('../data/items');\n  const E = require('../data/emojis');\n\n  const embed = new EmbedBuilder()\n    .setTitle(`🎁 แอดของให้ผู้เล่น`)\n    .setDescription(\n      `ผู้เล่น: <@${target.id}> **(${target.username})**\\n\\n` +\n      `เลือกหมวดหมู่ไอเทมที่ต้องการแอด:`\n    )\n    .setColor(0xF39C12)\n    .setThumbnail(target.displayAvatarURL());\n\n  const { ActionRowBuilder, ButtonBuilder, ButtonStyle, StringSelectMenuBuilder } = require('discord.js');\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('additem_cat_rod').setLabel('คันเบ็ด').setEmoji('🎣').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('additem_cat_charm').setLabel('เครื่องราง').setEmoji('💎').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('additem_cat_bait').setLabel('เหยื่อ').setEmoji('🪱').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('additem_cat_food').setLabel('อาหาร').setEmoji('🍱').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('additem_cat_fish').setLabel('ปลา').setEmoji('🐟').setStyle(ButtonStyle.Secondary),\n  );\n\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\nasync function handleAddItemCategory(interaction) {\n  if (interaction.user.id !== OWNER_ID)\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const session = addItemSessions.get(interaction.user.id);\n  if (!session) return interaction.reply({ content: '❌ Session หมดอายุ ใช้ /แอดของ ใหม่', ephemeral: true });\n\n  const category = interaction.customId.replace('additem_cat_', '');\n  const { RODS, BAITS, CHARMS, FOODS, CHARM_RARITY } = require('../data/items');\n  const E = require('../data/emojis');\n  const { ActionRowBuilder, StringSelectMenuBuilder } = require('discord.js');\n\n  let pool = [];\n  if (category === 'rod')   pool = Object.values(RODS);\n  if (category === 'bait')  pool = Object.values(BAITS);\n  if (category === 'food')  pool = Object.values(FOODS);\n  if (category === 'charm') pool = Object.values(CHARMS);\n  if (category === 'fish') {\n    try { const { FISH_LIST } = require('../data/fish'); pool = FISH_LIST; } catch {}\n  }\n\n  if (!pool.length) return interaction.reply({ content: '❌ ไม่มีไอเทมในหมวดนี้', ephemeral: true });\n\n  const options = pool.slice(0, 25).map(item => {\n    const rarityInfo = item.rarity && CHARM_RARITY[item.rarity] ? `[${CHARM_RARITY[item.rarity].name}] ` : '';\n    const emojiIdMatch = (E[item.id] || item.emoji || '').match(/<:[^:]+:(\\d+)>/);\n    const opt = {\n      label: `${rarityInfo}${item.name || item.id}`.slice(0, 100),\n      value: `${category}__${item.id}`,\n      description: (item.desc || item.price ? `${item.price?.toLocaleString() || ''}` : '').slice(0, 100),\n    };\n    if (emojiIdMatch) opt.emoji = { id: emojiIdMatch[1] };\n    return opt;\n  });\n\n  const categoryNames = { rod: 'คันเบ็ด', charm: 'เครื่องราง', bait: 'เหยื่อ', food: 'อาหาร', fish: 'ปลา' };\n  const row = new ActionRowBuilder().addComponents(\n    new StringSelectMenuBuilder()\n      .setCustomId('additem_select')\n      .setPlaceholder(`เลือก${categoryNames[category] || category}ที่ต้องการแอด`)\n      .setOptions(options)\n  );\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle(`เลือก${categoryNames[category] || category}`)\n      .setDescription(`แอดให้: **${session.targetName}**`)\n      .setColor(0x3498DB)],\n    components: [row],\n    ephemeral: true,\n  });\n}\n\nasync function handleAddItemSelect(interaction) {\n  if (interaction.user.id !== OWNER_ID)\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const session = addItemSessions.get(interaction.user.id);\n  if (!session) return interaction.reply({ content: '❌ Session หมดอายุ ใช้ /แอดของ ใหม่', ephemeral: true });\n\n  const [type, id] = interaction.values[0].split('__');\n  const { RODS, BAITS, CHARMS, FOODS, CHARM_RARITY } = require('../data/items');\n  const E = require('../data/emojis');\n  const { ActionRowBuilder, ButtonBuilder, ButtonStyle } = require('discord.js');\n\n  const all = { ...RODS, ...BAITS, ...CHARMS, ...FOODS };\n  let item = all[id];\n  if (!item) {\n    try { const { FISH_LIST } = require('../data/fish'); item = FISH_LIST.find(f => f.id === id); } catch {}\n  }\n  if (!item) return interaction.reply({ content: '❌ ไม่พบไอเทม', ephemeral: true });\n\n  const emoji = E[id] || item.emoji || '🎁';\n  const rarityInfo = item.rarity && CHARM_RARITY[item.rarity]\n    ? `${CHARM_RARITY[item.rarity].emoji()} **${CHARM_RARITY[item.rarity].name}**\\n` : '';\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder()\n      .setCustomId(`additem_confirm__${type}__${id}`)\n      .setLabel(`✅ ยืนยัน แอด ${item.name}`)\n      .setStyle(ButtonStyle.Danger),\n    new ButtonBuilder()\n      .setCustomId('additem_cancel')\n      .setLabel('ยกเลิก')\n      .setStyle(ButtonStyle.Secondary),\n  );\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle(`ยืนยันการแอดของ`)\n      .setDescription(\n        `ผู้เล่น: **${session.targetName}**\\n` +\n        `ไอเทม: ${emoji} **${item.name}**\\n` +\n        rarityInfo +\n        `\\nกดยืนยันเพื่อแอดไอเทมเข้า inventory ผู้เล่นโดยตรง`\n      )\n      .setColor(0xE74C3C)],\n    components: [row],\n    ephemeral: true,\n  });\n}\n\nasync function handleAddItemConfirm(interaction) {\n  if (interaction.user.id !== OWNER_ID)\n    return interaction.reply({ content: '❌', ephemeral: true });\n\n  const session = addItemSessions.get(interaction.user.id);\n  if (!session) return interaction.reply({ content: '❌ Session หมดอายุ', ephemeral: true });\n\n  const parts = interaction.customId.replace('additem_confirm__', '').split('__');\n  const type = parts[0];\n  const id   = parts[1];\n\n  const { RODS, BAITS, CHARMS, FOODS } = require('../data/items');\n  const E = require('../data/emojis');\n\n  const all = { ...RODS, ...BAITS, ...CHARMS, ...FOODS };\n  let item = all[id];\n  if (!item) {\n    try { const { FISH_LIST } = require('../data/fish'); item = FISH_LIST.find(f => f.id === id); } catch {}\n  }\n  if (!item) return interaction.reply({ content: '❌ ไม่พบไอเทม', ephemeral: true });\n\n  await db.addToInventory(session.targetId, type, id, 1);\n  // ถ้าเป็นคันเบ็ด ให้ equipped ด้วย\n  if (type === 'rod') {\n    const player = await db.getPlayer(session.targetId);\n    if (player) await db.updatePlayer(session.targetId, { rod: id });\n  }\n\n  addItemSessions.delete(interaction.user.id);\n\n  const emoji = E[id] || item.emoji || '🎁';\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ แอดของสำเร็จ!')\n      .setDescription(`แอด ${emoji} **${item.name}** ให้ <@${session.targetId}> เรียบร้อยแล้ว!`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\nasync function handleAddItemCancel(interaction) {\n  addItemSessions.delete(interaction.user.id);\n  await interaction.reply({ content: '❌ ยกเลิกแล้ว', ephemeral: true });\n}\n\nmodule.exports = {\n  handleAddPearl, handleRemovePearl, handleBanAccount, handleViewAccount,\n  handleAddItem,\n  handleAddItemCategory, handleAddItemSelect, handleAddItemConfirm, handleAddItemCancel,\n};\n", "handlers/fishing.js": "// fishing.js — ระบบตกปลา พร้อมน้ำหนัก + escaped tracking\n// แก้ bug: ถ้าผู้เล่น stamina มากกว่าหรือเท่ากับ damage ที่จะเหลือ\n//          และปลาจะหมดก่อนหรือเท่ากัน → ผู้เล่นชนะเสมอ\nconst { EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle } = require('discord.js');\nconst db = require('../database');\nconst { rollFish, LOCATIONS, RARITY } = require('../data/fish');\nconst { RODS, CHARMS, FOODS, calcLevel, getExpertiseTitle, LEVEL_REWARDS } = require('../data/items');\nconst E = require('../data/emojis');\n\nconst sessions = new Map();\nconst EXP_TABLE = { COMMON: 10, RARE: 30, LEGENDARY: 80, ANCIENT: 200 };\n\nfunction calcStats(player) {\n  const rod   = RODS[player.rod] || RODS.bamboo_rod;\n  const charm = player.active_charm ? (CHARMS[player.active_charm] || null) : null;\n  const food  = player.active_food  ? (FOODS[player.active_food]   || null) : null;\n  let power = rod.power + (rod.bonus?.power_bonus || 0);\n  let speed = rod.speed;\n  let luck  = rod.luck + (player.temp_luck || 0);\n  if (charm?.effect?.luck)         luck         += charm.effect.luck;\n  if (charm?.effect?.bite_speed)   speed        += charm.effect.bite_speed;\n  if (food?.effect?.temp_luck)     luck         += food.effect.temp_luck;\n  const staminaBonus = charm?.effect?.stamina_bonus || 0;\n  const expBonus     = (charm?.effect?.exp_bonus || 0) + (rod.bonus?.exp_bonus || 0);\n  return { rod, charm, food, power, speed, luck, staminaBonus, expBonus };\n}\n\n// ── 1) หน้าสถานที่ ──────────────────────────────────────────\nasync function handleLocationView(interaction) {\n  const locationId = interaction.customId.replace('loc_', '');\n  const loc = LOCATIONS[locationId];\n  if (!loc) return interaction.reply({ content: '❌ ไม่พบสถานที่', ephemeral: true });\n  const player = await db.getPlayer(interaction.user.id);\n  if (!player) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน!', ephemeral: true });\n  if (player.is_banned) return interaction.reply({ content: '🚫 บัญชีของคุณถูกแบน', ephemeral: true });\n  clearSession(interaction.user.id);\n\n  const stats = calcStats(player);\n  const charmInfo = stats.charm ? CHARMS[player.active_charm] : null;\n  const foodInfo  = stats.food  ? FOODS[player.active_food]   : null;\n  const { totalExpForLevel } = require('../data/items');\n  const expCurrent = player.exp || 0;\n  const expNext    = totalExpForLevel((player.level || 1) + 1);\n  const expBar     = buildExpBar(expCurrent, expNext);\n  const rodEmoji   = E[player.rod] || stats.rod.emoji;\n\n  const embed = new EmbedBuilder()\n    .setTitle(`${loc.emoji} ${loc.name}`)\n    .setDescription(\n      `${loc.desc}\\n\\n` +\n      `${E.pearl} Pearl: **${(player.pearl||0).toLocaleString()}** | ⭐ Lv.**${player.level}** | 🐟 **${player.total_fish_caught}** ตัว\\n` +\n      `${E.exp} EXP: ${expBar} **${expCurrent.toLocaleString()} / ${expNext.toLocaleString()}**\\n\\n` +\n      `**── สถิติผู้เล่น ──**\\n` +\n      `🎣 **${rodEmoji} ${stats.rod.name}** (⚡${stats.power} 🏃${stats.speed} ${E.luck}${stats.luck}%)\\n` +\n      `${E.luck} เครื่องราง: ${charmInfo ? `${E[charmInfo.id] || charmInfo.emoji} ${charmInfo.name}` : 'ไม่มี'}\\n` +\n      `🍱 อาหาร: ${foodInfo ? `${foodInfo.emoji} ${foodInfo.name}` : 'ไม่มี'}\\n` +\n      `❤️ Stamina: **${player.player_stamina ?? 100}/100** | ${E.luck} โชครวม: **${stats.luck}%**`\n    )\n    .setColor(loc.color)\n    .setImage(loc.image || null)\n    .setFooter({ text: 'Sori Adventure • กดตกปลาเพื่อเริ่ม!' });\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId(`fish_start_${locationId}`).setLabel('🎣 ตกปลา').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('menu_location').setLabel('🗺️ เปลี่ยนสถานที่').setStyle(ButtonStyle.Secondary),\n  );\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\n// ── 2) เริ่มตกปลา ────────────────────────────────────────────\nasync function handleFishStart(interaction) {\n  const userId     = interaction.user.id;\n  const locationId = interaction.customId.replace('fish_start_', '');\n\n  if (sessions.has(userId)) return interaction.reply({ content: '⚠️ กำลังตกปลาอยู่!', ephemeral: true });\n  const player = await db.getPlayer(userId);\n  if (!player) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน!', ephemeral: true });\n  if (player.is_banned) return interaction.reply({ content: '🚫 บัญชีของคุณถูกแบน', ephemeral: true });\n\n  const stats = calcStats(player);\n  const { fish, rarity, weight, weightRatio, fishStamina } = rollFish(stats.luck);\n  const rarityData = RARITY[rarity];\n  const fishEmoji  = getFishEmoji(fish.id, fish.emoji);\n\n  const session = {\n    locationId, fish, rarity, weight, weightRatio,\n    fishStamina, maxFishStamina: fishStamina,\n    playerStamina: (player.player_stamina > 0) ? player.player_stamina : 100,\n    stats, pullCount: 0,\n    phase: 'waiting_bite',\n    biteTimeout: null, pullTimeout: null,\n    fishEmoji,\n  };\n  sessions.set(userId, session);\n  await interaction.deferReply({ ephemeral: true });\n\n  const charmInfo = player.active_charm ? CHARMS[player.active_charm] : null;\n  const foodInfo  = player.active_food  ? FOODS[player.active_food]   : null;\n  const { totalExpForLevel } = require('../data/items');\n  const expNext = totalExpForLevel((player.level||1) + 1);\n  const expBar  = buildExpBar(player.exp||0, expNext);\n  const rodEmoji = E[player.rod] || stats.rod.emoji;\n\n  const tutEmbed = new EmbedBuilder()\n    .setTitle(`${E.howtoplay} วิธีการเล่น`)\n    .setDescription(\n      '**1.** รอปลากินเหยื่อ **(1–10 วินาที)**\\n\\n' +\n      '**2.** กด **\"ดึงเบ็ด!\"** ทันที\\n' +\n      '> ⚠️ ครั้งแรก **3 วิ** | ครั้งต่อไป **6 วิ**\\n\\n' +\n      '**3.** สุ่มการเคลื่อนไหวปลา:\\n' +\n      '> 🐟 **ดิ้น (80%)** → เสีย Stamina\\n' +\n      '> 😴 **เหนื่อย (20%)** → จับได้ทันที!\\n\\n' +\n      `**ข้อมูลปลาที่กำลังตก:**\\n` +\n      `> ${fishEmoji} **${fish.name}** | ${rarityData.emoji()} ${rarityData.name} | ⚖️ **${weight} kg**\\n` +\n      `> ❤️ Stamina ปลา: **${fishStamina}** ${weight >= rarityData.weightMax * 0.7 ? '⚠️ ตัวใหญ่มาก!' : ''}\\n\\n` +\n      `**── สถิติคุณ ──**\\n` +\n      `🎣 ${rodEmoji} **${stats.rod.name}** | ⚡${stats.power} 🏃${stats.speed} ${E.luck}${stats.luck}%\\n` +\n      `${E.luck} ${charmInfo ? `${E[charmInfo.id] || charmInfo.emoji} ${charmInfo.name}` : 'ไม่มีเครื่องราง'}\\n` +\n      `🍱 ${foodInfo ? `${foodInfo.emoji} ${foodInfo.name}` : 'ไม่มีอาหาร'}\\n` +\n      `❤️ Stamina ผู้เล่น: **${session.playerStamina}/100**\\n` +\n      `${E.exp} EXP: ${expBar}\\n\\n` +\n      '*กำลังรอปลากินเหยื่อ...*'\n    )\n    .setColor(0xF39C12);\n  await interaction.editReply({ embeds: [tutEmbed], components: [] });\n\n  const speedMult = 1 - Math.min(stats.speed, 60) / 100;\n  const biteDelay = Math.floor((Math.random() * 9 + 1) * 1000 * speedMult);\n  session.biteTimeout = setTimeout(() => triggerBite(interaction, userId), biteDelay);\n}\n\n// ── triggerBite — แสดงชื่อปลา + ระดับ + น้ำหนัก ─────────────\nasync function triggerBite(interaction, userId) {\n  const session = sessions.get(userId);\n  if (!session) return;\n  session.phase = 'can_pull';\n  const pullMs     = session.pullCount === 0 ? 3000 : 6000;\n  const rarityData = RARITY[session.rarity];\n\n  const biteEmbed = new EmbedBuilder()\n    .setTitle('🎣 ปลากินเหยื่อแล้ว!')\n    .setDescription(\n      `${session.fishEmoji} **${session.fish.name}** | ${rarityData.emoji()} **${rarityData.name}** | ⚖️ **${session.weight} kg**\\n\\n` +\n      `**กดดึงเบ็ดเดี๋ยวนี้!!!**\\n> ⏳ **${pullMs / 1000} วินาที** เท่านั้น!\\n\\n` +\n      `❤️ ผู้เล่น: ${staminaBar(session.playerStamina, '🟥', 100)} **${session.playerStamina}/100**\\n` +\n      `🐟 ปลา:    ${staminaBar(session.fishStamina, '🟦', session.maxFishStamina)} **${session.fishStamina}/${session.maxFishStamina}**`\n    )\n    .setColor(0xE74C3C)\n    .setThumbnail(getFishThumbnail(session.fishEmoji));\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId(`fish_pull_${userId}`).setLabel('🎣 ดึงเบ็ด!').setStyle(ButtonStyle.Danger),\n  );\n  try { await interaction.editReply({ embeds: [biteEmbed], components: [row] }); } catch (e) {}\n\n  session.pullTimeout = setTimeout(async () => {\n    if (!sessions.has(userId) || sessions.get(userId).phase !== 'can_pull') return;\n    await db.markEscaped(userId, session.fish.id).catch(() => {});\n    clearSession(userId);\n    const escapedEmbed = new EmbedBuilder()\n      .setTitle('😢 ปลาหลุดไปแล้ว!')\n      .setDescription(\n        `${session.fishEmoji} **${session.fish.name}** ⚖️ ${session.weight} kg หลบหนีไปแล้ว\\n*(บันทึกว่า \"เคยพบเจอ\" แล้ว)*`\n      )\n      .setColor(0x7F8C8D)\n      .setThumbnail(getFishThumbnail(session.fishEmoji));\n    try { await interaction.editReply({ embeds: [escapedEmbed], components: [buildRetryRow(session.locationId)] }); } catch (e) {}\n  }, pullMs);\n}\n\n// ── 3) กดดึงเบ็ด ─────────────────────────────────────────────\nasync function handleFishPull(interaction) {\n  const userId   = interaction.user.id;\n  const targetId = interaction.customId.replace('fish_pull_', '');\n  if (targetId !== userId) return interaction.reply({ content: '❌ ไม่ใช่เซสชั่นของคุณ!', ephemeral: true });\n\n  const session = sessions.get(userId);\n  if (!session || session.phase !== 'can_pull')\n    return interaction.reply({ content: '⚠️ ไม่มีปลาให้ดึง', ephemeral: true });\n\n  if (session.pullTimeout) { clearTimeout(session.pullTimeout); session.pullTimeout = null; }\n  session.pullCount++;\n  session.phase = 'pulling';\n  await interaction.deferUpdate();\n\n  // ── ปลาเหนื่อย (20%) → ชนะทันที ──\n  const isTired = Math.random() < 0.2;\n  if (isTired) {\n    clearSession(userId);\n    return resolveWin(interaction, session, 'tired');\n  }\n\n  // ── ปลาดิ้น (80%) ──\n  const powerBonus = Math.floor(session.stats.power * 0.5);\n  const fishDmg    = 35 + powerBonus;\n  const playerDmg  = 35;\n\n  // =============================================\n  //  FIX: ตรวจก่อนว่าใครจะหมดก่อน\n  //  ถ้าปลาจะหมดก่อน (หรือเท่ากัน) → ผู้เล่นชนะ\n  //  ถ้าผู้เล่นจะหมดก่อน → เสีย\n  // =============================================\n  const newPlayerStamina = Math.max(0, session.playerStamina - playerDmg);\n  const newFishStamina   = Math.max(0, session.fishStamina   - fishDmg);\n\n  session.playerStamina = newPlayerStamina;\n  session.fishStamina   = newFishStamina;\n\n  // ปลาหมดก่อน หรือหมดพร้อมกัน → ชนะ\n  if (newFishStamina <= 0 && newPlayerStamina <= newFishStamina) {\n    clearSession(userId);\n    return resolveWin(interaction, session, 'stamina');\n  }\n  if (newFishStamina <= 0) {\n    clearSession(userId);\n    return resolveWin(interaction, session, 'stamina');\n  }\n\n  // ผู้เล่นหมดก่อน → แพ้\n  if (newPlayerStamina <= 0) {\n    await db.markEscaped(userId, session.fish.id).catch(() => {});\n    clearSession(userId);\n    return resolveLose(interaction, session);\n  }\n\n  // ยังสู้ต่อ\n  session.phase = 'waiting_bite';\n  sessions.set(userId, session);\n\n  const fightEmbed = new EmbedBuilder()\n    .setTitle(`🐟 ${session.fishEmoji} ปลากำลังดิ้น!`)\n    .setDescription(\n      `${session.fish.name} | ${RARITY[session.rarity].emoji()} ${RARITY[session.rarity].name} | ⚖️ ${session.weight} kg\\n` +\n      `> คุณเสีย **${playerDmg}** Stamina | ปลาเสีย **${fishDmg}** Stamina\\n\\n` +\n      `❤️ ผู้เล่น: ${staminaBar(newPlayerStamina, '🟥', 100)} **${newPlayerStamina}/100**\\n` +\n      `🐟 ปลา:    ${staminaBar(newFishStamina, '🟦', session.maxFishStamina)} **${newFishStamina}/${session.maxFishStamina}**\\n\\n` +\n      '*รอปลากินเหยื่ออีกรอบ...*'\n    )\n    .setColor(0xE67E22)\n    .setThumbnail(getFishThumbnail(session.fishEmoji));\n  try { await interaction.editReply({ embeds: [fightEmbed], components: [] }); } catch (e) {}\n\n  const speedMult = 1 - Math.min(session.stats.speed, 60) / 100;\n  const biteDelay = Math.floor((Math.random() * 9 + 1) * 1000 * speedMult);\n  session.biteTimeout = setTimeout(() => triggerBite(interaction, userId), biteDelay);\n}\n\n// ── Win ──────────────────────────────────────────────────────\nasync function resolveWin(interaction, session, reason) {\n  const userId = interaction.user.id;\n  const { fish, rarity, locationId, weight, fishEmoji } = session;\n  const rarityInfo = RARITY[rarity];\n  const player = await db.getPlayer(userId);\n\n  const rodBonus  = session.stats.rod.bonus || {};\n  const pearlMult = 1 + ((rodBonus.pearl_bonus || 0) / 100);\n  const expMult   = 1 + ((session.stats.expBonus || 0) / 100);\n  const expEarned   = Math.round((EXP_TABLE[rarity] || 10) * expMult);\n  const pearlEarned = Math.round(fish.price * pearlMult);\n\n  const newExp      = (player.exp || 0) + expEarned;\n  const { calcLevel, getExpertiseTitle, totalExpForLevel } = require('../data/items');\n  const newLevel    = calcLevel(newExp);\n  const newPearl    = (player.pearl || 0) + pearlEarned;\n  const totalPearl  = (player.total_pearl_earned || 0) + pearlEarned;\n  const totalFish   = (player.total_fish_caught  || 0) + 1;\n  const levelUp     = newLevel > player.level;\n\n  await db.addToCollection(userId, fish.id);\n  await db.addFishToInventory(userId, fish.id, weight);\n\n  const updates = {\n    exp: newExp, level: newLevel, pearl: newPearl,\n    total_pearl_earned: totalPearl, total_fish_caught: totalFish,\n    expertise: getExpertiseTitle(newLevel),\n    player_stamina: 100,  // รีเซตกลับ 100 หลังจับปลาสำเร็จ\n    temp_luck: 0,\n  };\n  if (player.active_food) updates.active_food = null;\n  await db.updatePlayer(userId, updates);\n\n  let rewardText = '';\n  if (levelUp && LEVEL_REWARDS[newLevel]) rewardText = await giveReward(interaction, userId, newLevel);\n\n  const expNext = totalExpForLevel(newLevel + 1);\n  const expBar  = buildExpBar(newExp, expNext);\n  const winTitle = reason === 'tired'\n    ? `😴 ปลาเหนื่อย → จับได้! ${fishEmoji}`\n    : `💪 Stamina ปลาหมด → จับได้! ${fishEmoji}`;\n\n  const winEmbed = new EmbedBuilder()\n    .setTitle(winTitle)\n    .setDescription(\n      `${rarityInfo.emoji()} **${rarityInfo.name}** — **${fish.name}**\\n` +\n      `⚖️ น้ำหนัก: **${weight} kg**\\n\\n` +\n      `${E.pearl} +**${pearlEarned}** Pearl | ${E.exp} +**${expEarned}** EXP\\n` +\n      `${E.exp} EXP: ${expBar} **${newExp.toLocaleString()} / ${expNext.toLocaleString()}**\\n` +\n      (levelUp ? `\\n🎉 **เลเวลอัป! Lv.${player.level} → Lv.${newLevel}**\\n${rewardText}` : '') +\n      `\\n${E.pearl} Pearl: **${newPearl.toLocaleString()}**`\n    )\n    .setColor(rarityInfo.color)\n    .setFooter({ text: `ตกปลาทั้งหมด: ${totalFish} ตัว • Sori Adventure` })\n    .setThumbnail(getFishThumbnail(fishEmoji));\n\n  try { await interaction.editReply({ embeds: [winEmbed], components: [buildRetryRow(locationId)] }); } catch (e) {}\n}\n\n// ── Lose ─────────────────────────────────────────────────────\nasync function resolveLose(interaction, session) {\n  const userId = interaction.user.id;\n  // รีเซต stamina ทันที ไม่ต้องรอ\n  await db.updatePlayer(userId, { player_stamina: 100 });\n\n  const loseEmbed = new EmbedBuilder()\n    .setTitle('💀 Stamina หมด! ปลาหลุดไป...')\n    .setDescription(\n      `${session.fishEmoji} **${session.fish.name}** ⚖️ ${session.weight} kg หลบหนีไปแล้ว\\n*(บันทึกว่า \"เคยพบเจอ\" แล้ว)*\\n\\n` +\n      '❤️ Stamina รีเซตกลับ 100 แล้ว!'\n    )\n    .setColor(0xE74C3C)\n    .setThumbnail(getFishThumbnail(session.fishEmoji));\n  try { await interaction.editReply({ embeds: [loseEmbed], components: [buildRetryRow(session.locationId)] }); } catch (e) {}\n}\n\n// ── Level Reward ─────────────────────────────────────────────\nasync function giveReward(interaction, userId, level) {\n  const { LEVEL_REWARDS, RODS, CHARMS } = require('../data/items');\n  const reward = LEVEL_REWARDS[level];\n  if (!reward) return '';\n  if (reward.pearl) {\n    const p = await db.getPlayer(userId);\n    await db.updatePlayer(userId, { pearl: (p.pearl || 0) + reward.pearl });\n  }\n  for (const item of (reward.items || [])) await db.addToInventory(userId, item.type, item.id, 1);\n  try {\n    const member = await interaction.guild.members.fetch(userId);\n    for (const roleId of (reward.roles || [])) await member.roles.add(roleId).catch(() => {});\n  } catch (e) {}\n  let text = '';\n  if (reward.pearl) text += `> ${E.pearl} +${reward.pearl.toLocaleString()} Pearl\\n`;\n  if (reward.echo)  text += `> 💰 +${reward.echo.toLocaleString()} Echo\\n`;\n  for (const item of (reward.items || [])) {\n    const data = RODS[item.id] || CHARMS[item.id];\n    if (data) text += `> ${E[item.id] || data.emoji} **${data.name}**\\n`;\n  }\n  if (reward.roles?.length) text += `> 🏆 ได้รับยศใหม่!\\n`;\n  return text;\n}\n\n// ── Helpers ──────────────────────────────────────────────────\n// map fish id → custom emoji (fallback to default emoji)\n// E มี key ตาม fish_id โดยตรงแล้ว เพิ่มใน data/emojis.js ได้เลย\nfunction getFishEmoji(fishId, defaultEmoji) {\n  return E[fishId] || defaultEmoji;\n}\n\n// แปลง custom emoji string → thumbnail URL สำหรับ setThumbnail\nfunction getFishThumbnail(emojiStr) {\n  if (!emojiStr) return null;\n  const match = emojiStr.match(/:(\\d+)>/);\n  if (match) return `https://cdn.discordapp.com/emojis/${match[1]}.png?size=256`;\n  return null;\n}\n\nfunction staminaBar(cur, emoji, max) {\n  const filled = Math.round((cur / max) * 10);\n  return emoji.repeat(Math.max(0, filled)) + '⬛'.repeat(Math.max(0, 10 - filled));\n}\n\nfunction buildExpBar(cur, max) {\n  const pct    = Math.min(1, cur / max);\n  const filled = Math.round(pct * 10);\n  return '🟩'.repeat(filled) + '⬜'.repeat(10 - filled);\n}\n\nfunction buildRetryRow(locationId) {\n  return new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId(`fish_start_${locationId}`).setLabel('🎣 ตกปลาอีกครั้ง').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('menu_location').setLabel('🗺️ เปลี่ยนสถานที่').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('menu_bag').setLabel('🎒 กระเป๋า').setStyle(ButtonStyle.Secondary),\n  );\n}\n\nfunction clearSession(userId) {\n  const s = sessions.get(userId);\n  if (s) { if (s.biteTimeout) clearTimeout(s.biteTimeout); if (s.pullTimeout) clearTimeout(s.pullTimeout); }\n  sessions.delete(userId);\n}\n\nmodule.exports = { handleLocationView, handleFishStart, handleFishPull };\n", "handlers/food.js": "// ====================================================\n//  food.js — ระบบอาหาร: ซื้อ ขาย ทำอาหาร กิน\n// ====================================================\nconst { EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle } = require('discord.js');\nconst db = require('../database');\nconst { FOODS, RODS } = require('../data/items');\nconst { FISH_LIST, FISH_BY_RARITY } = require('../data/fish');\n\n// ===== หน้าเมนูอาหาร =====\nasync function handleFoodMenu(interaction) {\n  const player = await db.getPlayer(interaction.user.id);\n  if (!player) return interaction.reply({ content: '❌ ยังไม่ได้ลงทะเบียน!', ephemeral: true });\n\n  const currentFood = player.active_food ? FOODS[player.active_food] : null;\n\n  const embed = new EmbedBuilder()\n    .setTitle('🍱 ระบบอาหาร')\n    .setDescription(\n      `อาหารที่กินอยู่ตอนนี้: ${currentFood ? `${currentFood.emoji} **${currentFood.name}**` : 'ไม่มี'}\\n\\n` +\n      '**รายการอาหาร:**\\n' +\n      Object.values(FOODS).map(f =>\n        `${f.emoji} **${f.name}** — 🔘 ${f.price} Pearl${f.craftable ? ' | 🍳 ทำเองได้' : ''}\\n> ${f.desc}`\n      ).join('\\n\\n')\n    )\n    .setColor(0xE67E22);\n\n  const row1 = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('food_shop').setLabel('🛒 ซื้ออาหาร').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('food_craft').setLabel('🍳 ทำอาหาร').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('food_eat').setLabel('🍽️ กินอาหาร').setStyle(ButtonStyle.Secondary),\n  );\n  const row2 = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('food_sell').setLabel('💰 ขายอาหาร').setStyle(ButtonStyle.Danger),\n  );\n\n  await interaction.reply({ embeds: [embed], components: [row1, row2], ephemeral: true });\n}\n\n// ===== ร้านซื้ออาหาร =====\nasync function handleFoodShop(interaction) {\n  const player = await db.getPlayer(interaction.user.id);\n\n  const embed = new EmbedBuilder()\n    .setTitle('🛒 ร้านค้าอาหาร')\n    .setDescription(`🔘 Pearl ของคุณ: **${player.pearl.toLocaleString()}**\\n\\nเลือกอาหารที่ต้องการซื้อ:`)\n    .setColor(0xF39C12);\n\n  Object.values(FOODS).forEach(f => {\n    embed.addFields({ name: `${f.emoji} ${f.name}`, value: `${f.desc}\\n🔘 ราคา: **${f.price} Pearl**`, inline: true });\n  });\n\n  const rows = [];\n  const foodList = Object.values(FOODS);\n  for (let i = 0; i < foodList.length; i += 3) {\n    const chunk = foodList.slice(i, i + 3);\n    rows.push(new ActionRowBuilder().addComponents(\n      ...chunk.map(f => new ButtonBuilder()\n        .setCustomId(`food_buy_${f.id}`)\n        .setLabel(`${f.emoji} ซื้อ ${f.name}`)\n        .setStyle(ButtonStyle.Primary)\n      )\n    ));\n  }\n\n  await interaction.reply({ embeds: [embed], components: rows, ephemeral: true });\n}\n\n// ===== ซื้ออาหาร =====\nasync function handleFoodBuy(interaction) {\n  const foodId = interaction.customId.replace('food_buy_', '');\n  const food = FOODS[foodId];\n  if (!food) return interaction.reply({ content: '❌ ไม่พบอาหาร', ephemeral: true });\n\n  const player = await db.getPlayer(interaction.user.id);\n  if (player.pearl < food.price) {\n    return interaction.reply({\n      embeds: [new EmbedBuilder().setTitle('❌ Pearl ไม่พอ!').setDescription(`ต้องการ **${food.price}** แต่มี **${player.pearl}**`).setColor(0xE74C3C)],\n      ephemeral: true,\n    });\n  }\n\n  await db.updatePlayer(interaction.user.id, { pearl: player.pearl - food.price });\n  await db.addToInventory(interaction.user.id, 'food', foodId, 1);\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('✅ ซื้ออาหารสำเร็จ!')\n      .setDescription(`ได้รับ ${food.emoji} **${food.name}**!\\n🔘 Pearl คงเหลือ: **${player.pearl - food.price}**`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ===== ทำอาหาร =====\nasync function handleFoodCraft(interaction) {\n  const userId = interaction.user.id;\n  const inventory = await db.getInventory(userId);\n  const craftable = Object.values(FOODS).filter(f => f.craftable);\n\n  // ตรวจว่ามีปลาพอทำแต่ละอาหารมั้ย\n  const { FISH_BY_RARITY } = require('../data/fish');\n  const fishInv = inventory.filter(i => i.item_type === 'fish');\n\n  function countFishByRarity(rarity) {\n    const ids = new Set(FISH_BY_RARITY[rarity].map(f => f.id));\n    return fishInv.filter(i => ids.has(i.item_id)).reduce((s, i) => s + i.quantity, 0);\n  }\n\n  const embed = new EmbedBuilder()\n    .setTitle('🍳 ทำอาหาร')\n    .setDescription('ใช้ปลาในกระเป๋าทำอาหารได้!')\n    .setColor(0x27AE60);\n\n  const rows = [];\n  const buttons = [];\n  for (const food of craftable) {\n    const { fish_rarity, fish_count } = food.recipe;\n    const have = countFishByRarity(fish_rarity);\n    const canCraft = have >= fish_count;\n    embed.addFields({\n      name: `${food.emoji} ${food.name}`,\n      value: `วัตถุดิบ: ปลา${fish_rarity === 'COMMON' ? 'ธรรมดา' : fish_rarity === 'RARE' ? 'หายาก' : fish_rarity === 'LEGENDARY' ? 'ตำนาน' : 'โบราณ'} ×${fish_count}\\nมีอยู่: **${have}** | ${canCraft ? '✅ ทำได้' : '❌ ปลาไม่พอ'}`,\n      inline: false,\n    });\n    buttons.push(\n      new ButtonBuilder()\n        .setCustomId(`food_craft_${food.id}`)\n        .setLabel(`${food.emoji} ทำ ${food.name}`)\n        .setStyle(canCraft ? ButtonStyle.Success : ButtonStyle.Secondary)\n        .setDisabled(!canCraft)\n    );\n  }\n\n  for (let i = 0; i < buttons.length; i += 3) {\n    rows.push(new ActionRowBuilder().addComponents(...buttons.slice(i, i + 3)));\n  }\n\n  await interaction.reply({ embeds: [embed], components: rows, ephemeral: true });\n}\n\n// ===== ทำอาหารจริง =====\nasync function handleFoodDoCraft(interaction) {\n  const userId = interaction.user.id;\n  const foodId = interaction.customId.replace('food_craft_', '');\n  const food = FOODS[foodId];\n  if (!food || !food.craftable) return interaction.reply({ content: '❌ ทำไม่ได้', ephemeral: true });\n\n  const inventory = await db.getInventory(userId);\n  const { fish_rarity, fish_count } = food.recipe;\n  const { FISH_BY_RARITY } = require('../data/fish');\n  const rarityIds = new Set(FISH_BY_RARITY[fish_rarity].map(f => f.id));\n  const fishItems = inventory.filter(i => i.item_type === 'fish' && rarityIds.has(i.item_id));\n  const totalFish = fishItems.reduce((s, i) => s + i.quantity, 0);\n\n  if (totalFish < fish_count) {\n    return interaction.reply({ content: `❌ ปลาไม่พอ! ต้องการ ${fish_count} ตัว มีแค่ ${totalFish}`, ephemeral: true });\n  }\n\n  // ลบปลา\n  let remaining = fish_count;\n  for (const fi of fishItems) {\n    if (remaining <= 0) break;\n    const use = Math.min(fi.quantity, remaining);\n    await db.removeFromInventory(userId, 'fish', fi.item_id, use);\n    remaining -= use;\n  }\n\n  await db.addToInventory(userId, 'food', foodId, 1);\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('🍳 ทำอาหารสำเร็จ!')\n      .setDescription(`ได้รับ ${food.emoji} **${food.name}**!\\nใช้ปลา ×${fish_count} ในการทำ`)\n      .setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ===== กินอาหาร =====\nasync function handleFoodEat(interaction) {\n  const userId = interaction.user.id;\n  const inventory = await db.getInventory(userId);\n  const foodItems = inventory.filter(i => i.item_type === 'food');\n\n  if (!foodItems.length) {\n    return interaction.reply({ content: '❌ ไม่มีอาหาร! ไปซื้อหรือทำก่อนนะ', ephemeral: true });\n  }\n\n  const embed = new EmbedBuilder()\n    .setTitle('🍽️ กินอาหาร')\n    .setDescription('เลือกอาหารที่ต้องการกิน:')\n    .setColor(0xE67E22);\n\n  const buttons = foodItems.map(fi => {\n    const f = FOODS[fi.item_id];\n    return new ButtonBuilder()\n      .setCustomId(`food_eat_${fi.item_id}`)\n      .setLabel(`${f?.emoji || '🍱'} ${f?.name || fi.item_id} (×${fi.quantity})`)\n      .setStyle(ButtonStyle.Success);\n  });\n\n  const rows = [];\n  for (let i = 0; i < buttons.length; i += 3) {\n    rows.push(new ActionRowBuilder().addComponents(...buttons.slice(i, i + 3)));\n  }\n\n  await interaction.reply({ embeds: [embed], components: rows, ephemeral: true });\n}\n\n// ===== กินอาหารจริง =====\nasync function handleFoodDoEat(interaction) {\n  const userId = interaction.user.id;\n  const foodId = interaction.customId.replace('food_eat_', '');\n  const food = FOODS[foodId];\n  if (!food) return interaction.reply({ content: '❌ ไม่พบอาหาร', ephemeral: true });\n\n  const inv = await db.getInventoryItem(userId, 'food', foodId);\n  if (!inv || inv.quantity <= 0) return interaction.reply({ content: '❌ ไม่มีอาหารนี้แล้ว', ephemeral: true });\n\n  const player = await db.getPlayer(userId);\n  const { calcLevel, getExpertiseTitle } = require('../data/items');\n\n  const updates = {};\n  let desc = `กิน ${food.emoji} **${food.name}** แล้ว!\\n\\n`;\n\n  if (food.effect.exp) {\n    const newExp = (player.exp || 0) + food.effect.exp;\n    updates.exp = newExp;\n    updates.level = calcLevel(newExp);\n    updates.expertise = getExpertiseTitle(updates.level);\n    desc += `✨ +${food.effect.exp} EXP\\n`;\n  }\n  if (food.effect.pearl) {\n    updates.pearl = (player.pearl || 0) + food.effect.pearl;\n    desc += `🔘 +${food.effect.pearl} Pearl\\n`;\n  }\n  if (food.effect.temp_luck) {\n    updates.temp_luck = (player.temp_luck || 0) + food.effect.temp_luck;\n    updates.active_food = foodId;\n    desc += `🍀 +${food.effect.temp_luck} โชค (ครั้งถัดไป)\\n`;\n  }\n\n  await db.updatePlayer(userId, updates);\n  await db.removeFromInventory(userId, 'food', foodId, 1);\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder().setTitle('🍽️ กินอาหารแล้ว!').setDescription(desc).setColor(0x2ECC71)],\n    ephemeral: true,\n  });\n}\n\n// ===== ขายอาหาร =====\nasync function handleFoodSell(interaction) {\n  const userId = interaction.user.id;\n  const inventory = await db.getInventory(userId);\n  const foodItems = inventory.filter(i => i.item_type === 'food');\n\n  if (!foodItems.length) return interaction.reply({ content: '❌ ไม่มีอาหารให้ขาย', ephemeral: true });\n\n  const player = await db.getPlayer(userId);\n  let totalSell = 0;\n  for (const fi of foodItems) {\n    const f = FOODS[fi.item_id];\n    if (f) totalSell += f.sell * fi.quantity;\n    await db.removeFromInventory(userId, 'food', fi.item_id, fi.quantity);\n  }\n\n  await db.updatePlayer(userId, { pearl: (player.pearl || 0) + totalSell });\n\n  await interaction.reply({\n    embeds: [new EmbedBuilder()\n      .setTitle('💰 ขายอาหารทั้งหมดแล้ว!')\n      .setDescription(`🔘 ได้รับ **${totalSell} Pearl**\\nPearl ทั้งหมด: **${(player.pearl + totalSell).toLocaleString()}**`)\n      .setColor(0xF39C12)],\n    ephemeral: true,\n  });\n}\n\n// ===== Main router =====\nasync function handleFood(interaction) {\n  const id = interaction.customId;\n  if (id === 'food_menu')   return handleFoodMenu(interaction);\n  if (id === 'food_shop')   return handleFoodShop(interaction);\n  if (id === 'food_craft')  return handleFoodCraft(interaction);\n  if (id === 'food_eat')    return handleFoodEat(interaction);\n  if (id === 'food_sell')   return handleFoodSell(interaction);\n  if (id.startsWith('food_buy_'))   return handleFoodBuy(interaction);\n  if (id.startsWith('food_craft_')) return handleFoodDoCraft(interaction);\n  if (id.startsWith('food_eat_'))   return handleFoodDoEat(interaction);\n}\n\nmodule.exports = { handleFood };\n", "handlers/game.js": "const { EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle } = require('discord.js');\nconst db = require('../database');\nconst { LOCATIONS } = require('../data/fish');\nconst E = require('../data/emojis');\n\nasync function handleMainMenu(interaction) {\n  const player = await db.getPlayer(interaction.user.id);\n  if (!player) return interaction.reply({\n    embeds: [new EmbedBuilder().setTitle('❌ ยังไม่ได้ลงทะเบียน').setDescription('ลงทะเบียนที่ <#1489522462587879554> ก่อนนะ!').setColor(0xE74C3C)],\n    ephemeral: true,\n  });\n  if (player.is_banned) return interaction.reply({ content: '🚫 บัญชีของคุณถูกแบน', ephemeral: true });\n\n  const { totalExpForLevel } = require('../data/items');\n  const expCurrent = player.exp || 0;\n  const expNext    = totalExpForLevel((player.level || 1) + 1);\n  const pct    = Math.min(1, expCurrent / expNext);\n  const filled = Math.round(pct * 10);\n  const expBar = '🟩'.repeat(filled) + '⬜'.repeat(10 - filled);\n\n  const embed = new EmbedBuilder()\n    .setTitle('🌍 เมนูหลัก')\n    .setDescription(\n      `ยินดีต้อนรับ **${interaction.user.username}**\\n` +\n      `${E.pearl} Pearl: **${(player.pearl||0).toLocaleString()}** | ⭐ Lv.**${player.level}** | 🐟 **${player.total_fish_caught}** ตัว\\n` +\n      `${E.exp} EXP: ${expBar} **${expCurrent.toLocaleString()} / ${expNext.toLocaleString()}**`\n    )\n    .setColor(0x2ECC71)\n    .setFooter({ text: 'Sori Adventure • ระบบตกปลา' });\n\n  const row1 = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('menu_shop').setLabel('ร้านค้า').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('menu_location').setLabel('เลือกสถานที่').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('menu_bag').setLabel('กระเป๋า').setStyle(ButtonStyle.Secondary),\n  );\n  const row2 = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('fish_index').setLabel('สมุดบันทึกปลา').setEmoji({ id: '1490021446091538624', name: 'indexFish1' }).setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('menu_contact').setLabel('ติดต่อผู้สร้าง').setStyle(ButtonStyle.Secondary),\n    new ButtonBuilder().setCustomId('menu_howtoplay').setLabel('วิธีเล่น').setEmoji({ id: '1490021580930158602', name: 'guildbook1' }).setStyle(ButtonStyle.Secondary),\n  );\n\n  await interaction.reply({ embeds: [embed], components: [row1, row2], ephemeral: true });\n}\n\nasync function handleLocation(interaction) {\n  const embed = new EmbedBuilder()\n    .setTitle('🗺️ เลือกสถานที่ตกปลา')\n    .setDescription('แต่ละสถานที่มีปลาและความยากต่างกัน!')\n    .addFields(\n      { name: `${LOCATIONS.forest_stream.emoji} ${LOCATIONS.forest_stream.name}`, value: LOCATIONS.forest_stream.desc },\n      { name: `${LOCATIONS.amazon_river.emoji} ${LOCATIONS.amazon_river.name}`,   value: LOCATIONS.amazon_river.desc },\n      { name: `${LOCATIONS.spirit_river.emoji} ${LOCATIONS.spirit_river.name}`,   value: LOCATIONS.spirit_river.desc },\n      { name: `${LOCATIONS.crystal_cave.emoji} ${LOCATIONS.crystal_cave.name}`,   value: LOCATIONS.crystal_cave.desc },\n    )\n    .setColor(0x16A085);\n\n  const row = new ActionRowBuilder().addComponents(\n    new ButtonBuilder().setCustomId('loc_forest_stream').setLabel('🌲 ลำธารในป่าลึก').setStyle(ButtonStyle.Success),\n    new ButtonBuilder().setCustomId('loc_amazon_river').setLabel('🌿 แม่น้ำอเมซอล').setStyle(ButtonStyle.Primary),\n    new ButtonBuilder().setCustomId('loc_spirit_river').setLabel('👻 สายธารวิญญาณ').setStyle(ButtonStyle.Danger),\n    new ButtonBuilder().setCustomId('loc_crystal_cave').setLabel('💎 ถ้ำคริสตัล').setStyle(ButtonStyle.Secondary),\n  );\n  await interaction.reply({ embeds: [embed], components: [row], ephemeral: true });\n}\n\nasync function handleBag(interaction) {\n  const userId = interaction.user.id;\n  const inventory  = await db.getInventory(userId);\n  const collection = await db.getCollection(userId);\n  const player     = await db.getPlayer(userId);\n  const { RODS, BAITS, CHARMS, FOODS } = require('../data/items');\n  const { FISH_LIST } = require('../data/fish');\n\n  function listItems(type, dataMap) {\n    const items = inventory.filter(i => i.item_type === type);\n    if (!items.length) return '> ไม่มีของ';\n    return items.map(i => {\n      const d = dataMap[i.item_id];\n      return `> ${d?.emoji||'🔹'} **${d?.name||i.item_id}** ×${i.quantity}`;\n    }).join('\\n');\n  }\n\n  const fishItems = inventory.filter(i => i.item_type === 'fish');\n  const fishTotal = fishItems.reduce((s,f) => s + f.quantity, 0);\n\n  const embed = new EmbedBuilder()\n    .setTitle('🎒 กระเป๋าของฉัน')\n    .setDescription(`${E.pearl} Pearl: **${(player?.pearl||0).toLocaleString()}**`)\n    .addFields(\n      { name: '🎣 คันเบ็ด',    value: listItems('rod', RODS),    inline: false },\n      { name: '🪱 เหยื่อ',     value: listItems('bait', BAITS),  inline: false },\n      { name: '🍀 เครื่องราง', value: listItems('charm', CHARMS),inline: false },\n      { name: '🍱 อาหาร',      value: listItems('food', FOODS),  inline: false },\n      {\n        name: `🐟 ปลา (${fishTotal} ตัว)`,\n        value: fishItems.length\n          ? fishItems.slice(0, 15).map(f => {\n              const fd = FISH_LIST.find(x => x.id === f.item_id);\n              const fishEmoji = E[f.item_id] || fd?.emoji || '🐟';\n              const weightStr = f.weight ? ` ⚖️${f.weight}kg` : '';\n              return `> ${fishEmoji} **${fd?.name||f.item_id}**${weightStr}`;\n            }).join('\\n') + (fishItems.length > 15 ? `\\n> ...และอีก ${fishItems.length - 15} ตัว` : '')\n          : '> ยังไม่มีปลา',\n        inline: false,\n      },\n      { name: '📚 คอลเล็กชั่น', value: `${collection.filter(c=>c.count>0).length} / 45 ชนิด`, inline: false },\n    )\n    .setColor(0xF39C12);\n\n  await interaction.reply({ embeds: [embed], ephemeral: true });\n}\n\nasync function handleHowToPlay(interaction) {\n  const embed = new EmbedBuilder()\n    .setTitle(`${E.howtoplay} วิธีเล่น`)\n    .setDescription(\n      '**1.** ลงทะเบียนที่ <#1489522462587879554>\\n\\n' +\n      '**2.** กด **เริ่มเล่น** → **🗺️ เลือกสถานที่**\\n\\n' +\n      '**3.** กด **🎣 ตกปลา** เพื่อเริ่มมินิเกม\\n\\n' +\n      '**4.** รอปลากินเหยื่อ แล้วกด **ดึงเบ็ด!**\\n' +\n      '> ครั้งแรก 3 วิ | ครั้งต่อไป 6 วิ\\n\\n' +\n      '**5.** ⚖️ ปลายิ่งหนัก Stamina สูง ราคาสูงขึ้น!\\n\\n' +\n      '**6.** ถ้า Stamina ปลาหมดก่อน (หรือเท่ากัน) = ชนะ 🎉\\n' +\n      '> ระบบนับแบบ: ถ้าปลาเหลือน้อยกว่าผู้เล่น → ผู้เล่นชนะ\\n\\n' +\n      '**ระดับปลา:**\\n' +\n      '> ⚪ ธรรมดา (50%) | 🔵 หายาก (40%) | 🟣 ตำนาน (9%) | ⚫ โบราณ (1%)\\n\\n' +\n      `**สมุดบันทึก:** ✅ เคยจับแล้ว | 👁️ เคยพบเจอ`\n    )\n    .setColor(0x9B59B6);\n  await interaction.reply({ embeds: [embed], ephemeral: true });\n}\n\nmodule.exports = { handleMainMenu, handleLocation, handleBag, handleHowToPlay };\n", "handlers/index_fish.js": "// index_fish.js — สมุดบันทึกปลา แสดง caught/escaped per user\nconst { EmbedBuilder, ActionRowBuilder, ButtonBuilder, ButtonStyle } = require('discord.js');\nconst { FISH_LIST, RARITY } = require('../data/fish');\nconst E = require('../data/emojis');\nconst db = require('../database');\n\nconst PAGE_SIZE = 20;\n\nasync function buildFishIndexEmbed(page, userId) {\n  const totalPages = Math.ceil(FISH_LIST.length / PAGE_SIZE);\n  const start = (page - 1) * PAGE_SIZE;\n  const slice = FISH_LIST.slice(start, start + PAGE_SIZE);\n\n  // โหลด collection ของ user\n  const collection = await db.getCollection(userId);\n  const caughtMap  = {};\n  const escapedMap = {};\n  for (const row of collection) {\n    if (row.count  > 0) caughtMap[row.fish_id]  = row.count;\n    if (row.fish_escaped > 0) escapedMap[row.fish_id] = row.fish_escaped;\n  }\n\n  const lines = slice.map((f, i) => {\n    const r    = RARITY[f.rarity];\n    let status = '';\n    if (caughtMap[f.id])       status = ' ✅ **เคยจับแล้ว**';\n    else if (escapedMap[f.id]) status = ' 👁️ **เคยพบเจอ**';\n    const fishEmoji = E[f.id] || f.emoji;\n    return `\\`${String(start + i + 1).padStart(2, '0')}\\` ${fishEmoji} ${r.emoji()} **${f.name}**${status}`;\n  });\n\n  const totalCaught  = Object.keys(caughtMap).length;\n  const totalEscaped = Object.keys(escapedMap).filter(id => !caughtMap[id]).length;\n\n  const embed = new EmbedBuilder()\n    .setTitle(`📖 สมุดบันทึกปลา (หน้า ${page}/${totalPages})`)\n    .setDescription(\n      `✅ จับแล้ว: **${totalCaught}/45** | 👁️ เคยพบ: **${totalEscaped}** ตัว\\n` +\n      `**ตำนานสี:** ⚪ธรรมดา | 🔵หายาก | 🟣ตำนาน | ⚫โบราณ\\n\\n` +\n      lines.join('\\n')\n    )\n    .setColor(0x1ABC9C)\n    .setFooter({ text: `${start + 1}–${Math.min(start + PAGE_SIZE, FISH_LIST.length)} จาก ${FISH_LIST.length} ตัว • Sori Adventure` });\n\n  return embed;\n}\n\nfunction buildFishIndexRow(page) {\n  const totalPages = Math.ceil(FISH_LIST.length / PAGE_SIZE);\n  const row = new ActionRowBuilder();\n  if (page > 1)          row.addComponents(new ButtonBuilder().setCustomId(`fishidx_${page-1}`).setLabel('◀️ หน้าก่อน').setStyle(ButtonStyle.Secondary));\n  if (page < totalPages) row.addComponents(new ButtonBuilder().setCustomId(`fishidx_${page+1}`).setLabel('▶️ หน้าถัดไป').setStyle(ButtonStyle.Pr
